                document.getElementById('cover-overlay').src = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23111'/><text x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='30' opacity='0.2'>🎧</text></svg>";
                document.getElementById('currentTime').innerText = "0:00";
                document.getElementById('totalTime').innerText = "0:00";
                document.getElementById('progressBar').value = 0;
                document.title = "Auto-DJ Station";
            }


            if (playlist.length > 0) {
                document.getElementById('playlist-count-text').innerText =
                    `${trackIndex + 1} видео из ${playlist.length}`;
            } else {
                document.getElementById('playlist-count-text').innerText = "0 видео из 0";
            }

            updatePlayPauseIcon();
            updateDeckVisibility();
            updateButtons();
            setPlayerViewMode(currentPlayerViewMode);
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = playlist.length <= 1;
            document.getElementById('nextBtn').disabled = playlist.length <= 1;
        }

        function setMixStatus(isMixing) {
            const container = document.getElementById('meta-info-row');
            if (isMixing) {
                container.innerHTML = `<div class="status-badge">✨ MIXING IN PROGRESS...</div>`;
            } else {
                container.innerHTML = `
                <button id="mixBtn" class="btn-mix" onclick="forceCrossfade()">
                    ⚡ Сделать Crossfade
                </button>`;
            }
        }

        // --- PLAYER CORE ---

        function togglePlay() {
            if (playersReadyCount < 2) return;

            let activeP = (currentDeck === 1) ? p1 : p2;

            if (!isPlaying) {
                const pState = activeP.getPlayerState();
                if (pState === -1 || pState === 5 || pState === 0) {
                    startMix();
                } else {
                    activeP.playVideo();
                    startVideoLoadingTimeout(trackIndex);
                }
            } else {
                activeP.pauseVideo();
                clearVideoLoadingTimeout();
            }
        }

        function startMix() {
            if (playlist.length === 0) return;
            let activeP = (currentDeck === 1) ? p1 : p2;

            activeP.setVolume(100);
            loadDeck(activeP, trackIndex);

            activeP.playVideo();
            startVideoLoadingTimeout(trackIndex);
            prepareNext();
            renderPlaylist();
            updateUI();
        }

        function loadDeck(player, idx) {
            if (!playlist[idx]) return;
            player.loadVideoById(playlist[idx].id);
        }

        let activeLoadingTimeout = null;

        function startVideoLoadingTimeout(idx) {
            clearVideoLoadingTimeout();
            activeLoadingTimeout = setTimeout(() => {
                console.log(`Video loading timeout for index ${idx}`);
                handleVideoError(idx);
            }, 7000); // 7 seconds timeout
        }

        function clearVideoLoadingTimeout() {
            if (activeLoadingTimeout) {
                clearTimeout(activeLoadingTimeout);
                activeLoadingTimeout = null;
            }
        }

        function handleVideoError(idx) {
            clearVideoLoadingTimeout();
            if (!playlist[idx]) return;

            // Mark as error
            playlist[idx].isError = true;
            playlist[idx].title = "⚠ Ошибка (видео недоступно)";

            renderPlaylist();

            // Cancel active crossfade if this error is handling the fading-in song
            if (isCrossfading) {
                clearInterval(activeCrossfadeInterval);
                isCrossfading = false;
                setMixStatus(false);
                let nextP = (currentDeck === 1) ? p2 : p1;
                if (nextP && typeof nextP.stopVideo === 'function') nextP.stopVideo();
            }

            // Check if all tracks in the playlist are marked as error
            const allErrors = playlist.every(t => t.isError);
            if (allErrors) {
                showAllVideosError();
                return;
            }

            // Find next non-error track
            let nextIdx = (idx + 1) % playlist.length;
            while (playlist[nextIdx] && playlist[nextIdx].isError && nextIdx !== idx) {
                nextIdx = (nextIdx + 1) % playlist.length;
            }

            trackIndex = nextIdx;

            // Start playing the next track
            startMix();
        }

        function onPlayerError(event, deckNum) {
            console.error(`Player error on deck ${deckNum}:`, event.data);
            
            let activePlayerNum = currentDeck;
            let nextPlayerNum = (currentDeck === 1) ? 2 : 1;
            
            if (deckNum === activePlayerNum) {
                handleVideoError(trackIndex);
            } else if (deckNum === nextPlayerNum && isCrossfading) {
                if (window.nextTrackIndex !== null && window.nextTrackIndex !== undefined) {
                    handleVideoError(window.nextTrackIndex);
                }
            }
        }

        function showAllVideosError() {
            clearVideoLoadingTimeout();
            if (p1 && typeof p1.stopVideo === 'function') p1.stopVideo();
            if (p2 && typeof p2.stopVideo === 'function') p2.stopVideo();
            isPlaying = false;
            if (typeof updatePlayPauseIcon === 'function') updatePlayPauseIcon();

            document.getElementById('player-container').style.display = 'none';
            document.getElementById('player-error-state').style.display = 'flex';
        }

        function prepareNext() {
            if (playlist.length < 2) return;
            let nextP = (currentDeck === 1) ? p2 : p1;
            
            let startIndex = trackIndex;
            let nextIndex = (trackIndex + 1) % playlist.length;
            while (playlist[nextIndex] && playlist[nextIndex].isError && nextIndex !== startIndex) {
                nextIndex = (nextIndex + 1) % playlist.length;
            }

            if (nextIndex === startIndex) {
                window.nextTrackIndex = null;
                return;
            }

            window.nextTrackIndex = nextIndex;
            if (playlist[nextIndex]) {
                nextP.cueVideoById(playlist[nextIndex].id);
                nextP.setVolume(0);
            }
        }

        function jumpToTrack(index) {
            if (isCrossfading) return;
            trackIndex = index;
            if (currentPlayerViewMode === 'native-video') {
                if (pNative && playlist[trackIndex]) {
                    pNative.loadVideoById(playlist[trackIndex].id);
                } else if (!pNative && playlist[trackIndex]) {
                    setPlayerViewMode('native-video');
                }
            } else {
                startMix();
            }
            updateUI();
        }

        function nextTrack() {
            if (isCrossfading || playlist.length < 2) return;
            let startIndex = trackIndex;
            let nextIndex = (trackIndex + 1) % playlist.length;
            while (playlist[nextIndex] && playlist[nextIndex].isError && nextIndex !== startIndex) {
                nextIndex = (nextIndex + 1) % playlist.length;
            }
            trackIndex = nextIndex;
            startMix();
            updateUI();
        }

        function prevTrack() {
            if (isCrossfading || playlist.length < 2) return;
            let startIndex = trackIndex;
            let prevIndex = (trackIndex - 1 + playlist.length) % playlist.length;
            while (playlist[prevIndex] && playlist[prevIndex].isError && prevIndex !== startIndex) {
                prevIndex = (prevIndex - 1 + playlist.length) % playlist.length;
            }
            trackIndex = prevIndex;
            startMix();
            updateUI();
        }

        function forceCrossfade() {
            if (!isPlaying || isCrossfading || playlist.length < 2) return;
            performCrossfade();
        }

        // --- TIMER & CROSSFADE ---

        function startLoop() {
            clearInterval(updateTimer);
            updateTimer = setInterval(updatePlayerLoop, 500);
        }

        function updatePlayerLoop() {
            if (!isPlaying) return;

            let activeP = (currentDeck === 1) ? p1 : p2;
            if (!activeP || typeof activeP.getDuration !== 'function') return;

            let duration = activeP.getDuration();
            let current = activeP.getCurrentTime();

            if (!duration || duration <= 0) return;

            if (!isDragging) {
                let pct = (current / duration) * 100;
                document.getElementById('currentTime').innerText = formatTime(current);
                document.getElementById('totalTime').innerText = formatTime(duration);
                document.getElementById('progressBar').value = pct;
            }

            if (!isCrossfading &&
                (duration - current) < crossfadeDuration &&
                (duration - current) > 0.5 &&
                playlist.length > 1) {
                performCrossfade();
            }
        }

        function performCrossfade() {
            isCrossfading = true;
            setMixStatus(true);

            let activeP = (currentDeck === 1) ? p1 : p2;
            let nextP = (currentDeck === 1) ? p2 : p1;

            nextP.playVideo();
            
            // Start the loading timeout for the next track being faded in!
            if (window.nextTrackIndex !== null && window.nextTrackIndex !== undefined) {
                startVideoLoadingTimeout(window.nextTrackIndex);
            }

            let steps = 40;
            let stepTime = (crossfadeDuration * 1000) / steps;
            let vol = 0;

            clearInterval(activeCrossfadeInterval);
            activeCrossfadeInterval = setInterval(() => {
                vol += (100 / steps);
                if (vol > 100) vol = 100;

                let realNextVol = (vol / 100) * playerVolume;
                let realActiveVol = ((100 - vol) / 100) * playerVolume;

                nextP.setVolume(realNextVol);
                activeP.setVolume(realActiveVol);


                if (vol >= 100) {
                    clearInterval(activeCrossfadeInterval);
                    finishMix(activeP);
                }
            }, stepTime);
        }

        function copyPlaylistLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                let btn = document.querySelector('button[data-tooltip="Копировать ссылку на плейлист"] svg');
                if (!btn) return;
                let inner = btn.innerHTML;
                btn.innerHTML = `<polyline points="20 6 9 17 4 12"></polyline>`;
                setTimeout(() => { btn.innerHTML = inner; }, 2000);
            }).catch(err => {
                console.error("Не удалось скопировать: ", err);
            });
        }



        function finishMix(oldP) {
            oldP.stopVideo();
            isCrossfading = false;
            setMixStatus(false);

            currentDeck = (currentDeck === 1) ? 2 : 1;
            if (window.nextTrackIndex !== null && window.nextTrackIndex !== undefined) {
                trackIndex = window.nextTrackIndex;
            } else {
                trackIndex = (trackIndex + 1) % playlist.length;
            }

            updateUI();
            renderPlaylist();
            prepareNext();
        }





        function changeCrossfade(val) {
            crossfadeDuration = parseInt(val);
            localStorage.setItem('crossfade-duration', crossfadeDuration);
            document.getElementById('crossfadeValue').innerText = val;
        }

        function changeVolume(val) {
            playerVolume = parseInt(val);
            localStorage.setItem('crossfade-volume', playerVolume);
            document.getElementById('volumeValue').innerText = val;

            if (!isCrossfading) {
                let activeP = (currentDeck === 1) ? p1 : p2;
                if (activeP && activeP.setVolume) activeP.setVolume(playerVolume);
            }
            updateVolumeIcon();
        }

        function updateVolumeIcon() {
            const high = document.getElementById('icon-vol-high');
            const mute = document.getElementById('icon-vol-mute');
            if (playerVolume === 0) {
                high.style.display = 'none';
                mute.style.display = 'block';
            } else {
                high.style.display = 'block';
                mute.style.display = 'none';
            }
        }

        function toggleMute() {
            if (playerVolume > 0) {
                prevVolume = playerVolume;
                changeVolume(0);
                document.getElementById('volumeSlider').value = 0;
            } else {
                let target = prevVolume > 0 ? prevVolume : 100;
                changeVolume(target);
                document.getElementById('volumeSlider').value = target;
            }
        }

        function extractVideoId(url) {

            var regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            var match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        function extractListId(url) {
            let reg = /[?&]list=([^#\&\?]+)/;
            let match = url.match(reg);
            return (match && match[1]) ? match[1] : null;
        }

        function importPlaylist(listId, autoReplace = false) {
            if (isPlaying && isCrossfading) { alert("Подождите конца перехода"); return; }

            window.isScanning = true;
            window.autoReplacePlaylist = autoReplace;
            window.scanningListId = listId;
            document.getElementById('current-track-info').innerText = "Сканирую плейлист...";

            if (window.scannerPlayer) {
                try {
                    window.scannerPlayer.destroy();
                } catch (e) { }
                window.scannerPlayer = null;
            }

            let scannerDiv = document.getElementById('hidden-scanner');
            if (!scannerDiv) {
                scannerDiv = document.createElement('div');
                scannerDiv.id = 'hidden-scanner';
                scannerDiv.style.display = 'none';
                document.body.appendChild(scannerDiv);
            }

            window.scannerPlayer = new YT.Player('hidden-scanner', {
                height: '1', width: '1',
                playerVars: { origin: window.location.origin },
                events: {
                    'onReady': (e) => { e.target.cuePlaylist({ list: listId }); },
                    'onStateChange': onPlayerStateChange
                }
            });

            document.getElementById('importBox').classList.remove('show');
        }


        function updateUrlState() {
            let url = new URL(window.location.href);
            if (window.currentListId) {
                url.searchParams.set('list', window.currentListId);
                url.searchParams.delete('v');
            } else {
                let vIds = playlist.map(item => item.id).join(',');
                if (vIds && vIds.length < 1500) {
                    url.searchParams.set('v', vIds);
                } else {
                    url.searchParams.delete('v');
                }
                url.searchParams.delete('list');
            }
            window.history.replaceState({}, '', url);
        }

        function onPlayerStateChange(event) {
            // --- 1. ЛОГИКА СИНХРОНИЗАЦИИ КНОПКИ ---
            let activePlayer = (currentDeck === 1) ? p1 : p2;
            let nextPlayer = (currentDeck === 1) ? p2 : p1;

            if (event.target === activePlayer) {
                if (event.data === YT.PlayerState.PLAYING) {
                    clearVideoLoadingTimeout();
                    if (!isPlaying) {
                        isPlaying = true;
                        updatePlayPauseIcon();
                        startLoop();
                    }
                    updatePlayerLoop();
                    updateUI();
                }
                else if (event.data === YT.PlayerState.PAUSED) {
                    clearVideoLoadingTimeout();
                    if (isPlaying) {
                        isPlaying = false;
                        updatePlayPauseIcon();
                    }
                    updateUI();
                }
            } else if (event.target === nextPlayer && isCrossfading) {
                if (event.data === YT.PlayerState.PLAYING) {
                    clearVideoLoadingTimeout();
                }
            }

            // --- 2. ЛОГИКА СКАНИРОВАНИЯ ---
            if (window.isScanning && event.data === 5) {
                let ids = event.target.getPlaylist();
                if (ids && ids.length > 0) {
                    let shouldReplace = true; // Убрали confirm по просьбе пользователя
                    if (shouldReplace) {
                        playlist = [];
                        trackIndex = 0;
                        currentDeck = 1;
                        p1.stopVideo(); p2.stopVideo();
                        isPlaying = false;
                        updatePlayPauseIcon();

                        const isSaved = window.loadedPlaylistUrl && window.loadedPlaylistUrl.includes(`list=${window.scanningListId}`);
                        if (!isSaved) {
                            window.loadedPlaylistName = null;
                            window.loadedPlaylistUrl = null;
                        }

                        window.currentListId = window.scanningListId;
                    } else {
                        window.currentListId = null;
                    }
                    ids.forEach(vid => playlist.push({ id: vid, title: "Video ID: " + vid }));
                    renderPlaylist();
                    window.isScanning = false;
                    window.autoReplacePlaylist = false;

                    if (window.currentUser && window.db && window.scanningListId) {
                        updateSavedPlaylistInfo(window.scanningListId, ids[0], ids.length);
                    }

                    window.scanningListId = null;
                    updateUrlState();
                    fetchTitlesForPlaylist();

                    if (!isPlaying) {
                        if (shouldReplace) {
                            loadDeck(p1, 0);
                            prepareNext();
                        }
                        updateUI();
                    }
                } else {
                    window.isScanning = false;
                    window.autoReplacePlaylist = false;
                    document.getElementById('current-track-info').innerText = playlist[trackIndex] ? playlist[trackIndex].title : "Ожидание...";
                }
            }
        }

        async function fetchTitlesForPlaylist() {

            for (let i = 0; i < playlist.length; i++) {
                if (playlist[i] && (playlist[i].title.startsWith("Video ID") || playlist[i].title === "Загрузка...")) {
                    try {
                        const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${playlist[i].id}`);
                        const data = await response.json();
                        if (data.title) {
                            playlist[i].title = data.title;
                            renderPlaylist();
                            if (i === trackIndex) updateUI();
                        } else {
                            playlist[i].title = "⚠ Ошибка (видео недоступно)";
                            playlist[i].isError = true;
                            renderPlaylist();
                            if (i === trackIndex) {
                                handleVideoError(i);
                            }
                        }
                    } catch (e) { }
                }
            }
        }

        function shufflePlaylist() {
            if (playlist.length < 2) return;
            let current = playlist[trackIndex];
            let others = playlist.filter((_, i) => i !== trackIndex);
            for (let i = others.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [others[i], others[j]] = [others[j], others[i]];
            }
             playlist = [current, ...others];
            trackIndex = 0;
            window.currentListId = null;
            window.loadedPlaylistName = null;
            window.loadedPlaylistUrl = null;
            renderPlaylist();
            prepareNext();
            updateUrlState();
        }

        function seekTo(val) {
            let activeP = (currentDeck === 1) ? p1 : p2;
            let dur = activeP.getDuration();
            if (dur > 0) {
                activeP.seekTo(dur * (val / 100), true);
            }
        }

        function formatTime(s) {
            let m = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // --- FIREBASE SAVED PLAYLISTS ---

        let activeDeleteId = null;
        function openDeletePlaylistModal(id, event) {
            if (event) event.stopPropagation();
            activeDeleteId = id;
            const modal = document.getElementById('deletePlaylistModal');
            if (modal) {
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('active'), 10);
            }
        }

        function closeDeletePlaylistModal() {
            activeDeleteId = null;
            const modal = document.getElementById('deletePlaylistModal');
            if (modal) {
                modal.classList.remove('active');
                setTimeout(() => { modal.style.display = 'none'; }, 250);
            }
        }

        async function submitDeletePlaylist() {
            if (!activeDeleteId) return;
            try {
                const userDoc = window.doc(window.db, "users", window.currentUser.uid);
                const docSnap = await window.getDoc(userDoc);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.saved_playlists && Array.isArray(data.saved_playlists)) {
                        let savedPlaylists = data.saved_playlists;
                        const playlistToDelete = savedPlaylists.find(p => p.id === activeDeleteId);
                        if (playlistToDelete) {
                            savedPlaylists = savedPlaylists.filter(p => p.id !== activeDeleteId);
                            await window.updateDoc(userDoc, {
                                saved_playlists: savedPlaylists
                            });
                            if (window.loadedPlaylistUrl === playlistToDelete.url) {
                                closePlayerCard();
                            }
                            renderSavedPlaylists(savedPlaylists);
                        }
                    }
                }
                closeDeletePlaylistModal();
            } catch (e) {
                console.error("Ошибка удаления плейлиста:", e);
                alert("Не удалось удалить плейлист.");
            }
        }

        function loadSavedPlaylist(urlStr, name) {
            const cardEl = document.getElementById('main-player-card');
            if (cardEl) {
                cardEl.style.display = 'block';
                document.getElementById('player-container').style.display = 'flex';
                document.getElementById('player-error-state').style.display = 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            window.loadedPlaylistName = name;
            window.loadedPlaylistUrl = urlStr;

            const url = new URL(urlStr, window.location.origin);
            const listId = url.searchParams.get('list');
            const vIds = url.searchParams.get('v');
            if (listId) {
                importPlaylist(listId, true);
            } else if (vIds) {
                let ids = vIds.split(',');
                playlist = [];
                ids.forEach(id => playlist.push({ id: id, title: "Загрузка..." }));
                trackIndex = 0;
                window.currentListId = null;
                renderPlaylist();
                fetchTitlesForPlaylist();
                loadDeck(p1, 0);
                prepareNext();
                updateUI();
            }
        }

        async function updateSavedPlaylistInfo(listId, firstVideoId, count) {
            if (!window.currentUser || !window.db) return;
            try {
                const userDoc = window.doc(window.db, "users", window.currentUser.uid);
                const docSnap = await window.getDoc(userDoc);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.saved_playlists && Array.isArray(data.saved_playlists)) {
                        let updated = false;
                        const newList = data.saved_playlists.map(p => {
                            if (p.url.includes(`list=${listId}`)) {
                                if (p.first_video_id !== firstVideoId || p.tracks_count !== count) {
                                    p.first_video_id = firstVideoId;
                                    p.tracks_count = count;
                                    updated = true;
                                }
                            }
                            return p;
                        });
                        if (updated) {
                            await window.updateDoc(userDoc, { saved_playlists: newList });
                            renderSavedPlaylists(newList);
                        }
                    }
                }
            } catch (e) {
                console.error("Ошибка при обновлении информации о плейлисте:", e);
            }
        }

        let activeRenameId = null;
        function openRenamePlaylistModal(id, currentName, event) {
            if (event) event.stopPropagation();
            activeRenameId = id;
            const modal = document.getElementById('renamePlaylistModal');
            const input = document.getElementById('modalRenameInput');
            if (modal && input) {
                input.value = currentName;
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('active'), 10);
                input.focus();
            }
        }

        function closeRenamePlaylistModal() {
            activeRenameId = null;
            const modal = document.getElementById('renamePlaylistModal');
            if (modal) {
                modal.classList.remove('active');
                setTimeout(() => { modal.style.display = 'none'; }, 250);
            }
        }

        async function submitRenamePlaylist() {
            if (!activeRenameId) return;
            const input = document.getElementById('modalRenameInput');
            const newName = input.value.trim();
            if (!newName) {
                alert("Пожалуйста, введите название.");
                return;
            }
            try {
                const userDoc = window.doc(window.db, "users", window.currentUser.uid);
                const docSnap = await window.getDoc(userDoc);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.saved_playlists && Array.isArray(data.saved_playlists)) {
                        let savedPlaylists = data.saved_playlists;
                        let playlistToEdit = savedPlaylists.find(p => p.id === activeRenameId);
                        if (playlistToEdit) {
                            playlistToEdit.name = newName;
                            await window.updateDoc(userDoc, {
                                saved_playlists: savedPlaylists
                            });
                            if (window.loadedPlaylistUrl === playlistToEdit.url) {
                                window.loadedPlaylistName = newName;
                                document.getElementById('playlist-title-text').innerText = newName;
                            }
                            renderSavedPlaylists(savedPlaylists);
                        }
                    }
                }
                closeRenamePlaylistModal();
            } catch (e) {
                console.error("Ошибка при переименовании плейлиста:", e);
                alert("Не удалось переименовать плейлист.");
            }
        }

        function renderSavedPlaylists(list) {
            const container = document.getElementById('saved-playlists-section');
            const listContainer = document.getElementById('saved-playlists-list');
            if (!listContainer) return;

            listContainer.innerHTML = '';
            if (!window.currentUser || !list || list.length === 0) {
                container.style.display = 'flex';
                listContainer.innerHTML = `
                    <div class="playlists-empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="16" y2="18"></line>
                            <path d="M3 6h2v6H3V6zm0 8h2v4H3v-4z"></path>
                        </svg>
                        <h3>У вас пока нет плейлистов</h3>
                        <p>Добавьте свой первый плейлист с YouTube по ссылке и начните удобно организовывать свои видео.</p>
                    </div>
                `;
                return;
            }

            container.style.display = 'flex';
            list.forEach(p => {
                const url = new URL(p.url, window.location.origin);
                const listId = url.searchParams.get('list');
                const vIds = url.searchParams.get('v');

                let firstVideoId = p.first_video_id || null;
                let tracksCount = p.tracks_count || null;

                if (!firstVideoId && vIds) {
                    firstVideoId = vIds.split(',')[0];
                }
                if (!tracksCount && vIds) {
                    tracksCount = vIds.split(',').length;
                }

                let coverHtml = '';
                if (firstVideoId) {
                    coverHtml = `<img src="https://i.ytimg.com/vi/${firstVideoId}/mqdefault.jpg" loading="lazy" alt="Cover">`;
                } else {
                    coverHtml = `🎧`;
                }

                let metaText = '';
                if (tracksCount) {
                    const lastDigit = tracksCount % 10;
                    const lastTwoDigits = tracksCount % 100;
                    let videoWord = 'видео';
                    if (lastTwoDigits < 11 || lastTwoDigits > 19) {
                        if (lastDigit === 1) {
                            videoWord = 'видео';
                        } else if (lastDigit >= 2 && lastDigit <= 4) {
                            videoWord = 'видео';
                        }
                    }
                    metaText = `${tracksCount} ${videoWord}`;
                } else if (listId) {
                    metaText = `YouTube Плейлист`;
                } else {
                    metaText = new Date(p.created_at).toLocaleDateString();
                }

                const div = document.createElement('div');
                div.className = 'saved-playlist-card';
                div.onclick = () => loadSavedPlaylist(p.url, p.name);

                div.innerHTML = `
                    <div class="playlist-card-cover">
                        ${coverHtml}
                    </div>
                    <div class="playlist-card-content">
                        <div class="playlist-card-title" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</div>
                        <div class="playlist-card-meta">${metaText}</div>
                    </div>
                    <div class="playlist-card-actions">
                        <button class="btn-delete-playlist" onclick="openRenamePlaylistModal('${p.id}', '${escapeHtml(p.name)}', event)" title="Редактировать название">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                        <button class="btn-delete-playlist" onclick="openDeletePlaylistModal('${p.id}', event)" title="Удалить">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        async function loadSavedPlaylistsFromFirebase(uid) {
            if (!window.db) return;
            try {
                const userDoc = window.doc(window.db, "users", uid);
                const docSnap = await window.getDoc(userDoc);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.saved_playlists && Array.isArray(data.saved_playlists)) {
                        renderSavedPlaylists(data.saved_playlists);
                    } else {
                        renderSavedPlaylists([]);
                    }
                } else {
                    renderSavedPlaylists([]);
                }
            } catch (e) {
                console.error("Ошибка загрузки сохраненных плейлистов:", e);
            }
        }

        function openAddPlaylistModal() {
            if (!window.currentUser) {
                if (typeof window.openAuthModal === 'function') {
                    window.openAuthModal(document.querySelector('.saved-playlists-title'), 'login');
                } else {
                    alert("Пожалуйста, войдите в аккаунт, чтобы сохранять плейлисты.");
                }
                return;
            }
            const modal = document.getElementById('addPlaylistModal');
            if (modal) {
                modal.style.display = 'flex';
                setTimeout(() => {
                    modal.classList.add('active');
                }, 10);
                document.getElementById('modalPlaylistUrl').focus();
            }
        }

        function closeAddPlaylistModal() {
            const modal = document.getElementById('addPlaylistModal');
            if (modal) {
                modal.classList.remove('active');
                setTimeout(() => {
                    modal.style.display = 'none';
                    document.getElementById('modalPlaylistUrl').value = '';
                    document.getElementById('modalPlaylistName').value = '';
                }, 250);
            }
        }

        async function submitNewPlaylist() {
            const urlInput = document.getElementById('modalPlaylistUrl');
            const nameInput = document.getElementById('modalPlaylistName');
            const urlValue = urlInput.value.trim();
            let nameValue = nameInput.value.trim();

            if (!urlValue) {
                alert("Пожалуйста, введите ссылку на плейлист или видео.");
                return;
            }

            let listId = extractListId(urlValue);
            let videoId = extractVideoId(urlValue);

            if (!listId && !videoId) {
                alert("Ссылка на YouTube не распознана.");
                return;
            }

            let pathUrl = "";
            let defaultName = "";
            if (listId) {
                pathUrl = `crossfade.html?list=${listId}`;
                defaultName = "YouTube Плейлист";
            } else {
                pathUrl = `crossfade.html?v=${videoId}`;
                defaultName = "YouTube Видео";
            }

            let finalName = nameValue || defaultName;

            if (!window.currentUser) {
                alert("Необходимо войти в аккаунт.");
                return;
            }

            try {
                const userDoc = window.doc(window.db, "users", window.currentUser.uid);
                const docSnap = await window.getDoc(userDoc);
                let savedPlaylists = [];
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.saved_playlists && Array.isArray(data.saved_playlists)) {
                        savedPlaylists = data.saved_playlists;
                    }
                }

                savedPlaylists.unshift({
                    id: Date.now().toString(),
                    name: finalName,
                    url: pathUrl,
                    first_video_id: videoId || null,
                    tracks_count: listId ? null : 1,
                    created_at: new Date().toISOString()
                });

                await window.updateDoc(userDoc, {
                    saved_playlists: savedPlaylists
                });

                renderSavedPlaylists(savedPlaylists);
                closeAddPlaylistModal();
            } catch (e) {
                console.error("Ошибка при сохранении плейлиста в Firebase:", e);
                alert("Не удалось сохранить плейлист.");
            }
        }

        function closePlayerCard() {
            if (p1 && typeof p1.stopVideo === 'function') p1.stopVideo();
            if (p2 && typeof p2.stopVideo === 'function') p2.stopVideo();
            isPlaying = false;
            if (typeof updatePlayPauseIcon === 'function') updatePlayPauseIcon();

            playlist = [];
            trackIndex = 0;
            window.currentListId = null;
            window.loadedPlaylistName = null;
            window.loadedPlaylistUrl = null;

            renderPlaylist();
            updateUI();
            updateUrlState();

            const cardEl = document.getElementById('main-player-card');
            if (cardEl) {
                cardEl.style.display = 'none';
            }
            document.getElementById('player-container').style.display = 'flex';
            document.getElementById('player-error-state').style.display = 'none';
        }

        window.addEventListener('click', (e) => {
            const addModal = document.getElementById('addPlaylistModal');
            const renameModal = document.getElementById('renamePlaylistModal');
            const deleteModal = document.getElementById('deletePlaylistModal');
            if (e.target === addModal) {
                closeAddPlaylistModal();
            }
            if (e.target === renameModal) {
                closeRenamePlaylistModal();
            }
            if (e.target === deleteModal) {
                closeDeletePlaylistModal();
            }
        });

        window.addEventListener('authChanged', async (e) => {
            const user = e.detail.user;
            window.currentUser = user;
            if (user) {
                await loadSavedPlaylistsFromFirebase(user.uid);
            } else {
                renderSavedPlaylists([]);
            }
        });
    </script>

    <link rel="stylesheet" href="footer.css">
    <div id="footer"></div>
    <script>
        fetch('footer.html')
            .then(r => r.text())
            .then(html => { if (html) document.getElementById('footer').innerHTML = html; })
            .catch(() => { });
    </script>

    <!-- Модальное окно добавления плейлиста -->
    <div id="addPlaylistModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title">Добавить плейлист</h3>
                <button class="modal-close" onclick="closeAddPlaylistModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label for="modalPlaylistUrl">Ссылка на YouTube плейлист или видео</label>
                    <input type="text" id="modalPlaylistUrl" class="modal-input" placeholder="https://www.youtube.com/playlist?list=..." autocomplete="off">
                </div>
                <div class="modal-field">
                    <label for="modalPlaylistName">Название плейлиста (необязательно)</label>
                    <input type="text" id="modalPlaylistName" class="modal-input" placeholder="Мой плейлист" autocomplete="off">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-cancel" onclick="closeAddPlaylistModal()">Отмена</button>
                <button class="btn-modal btn-modal-submit" onclick="submitNewPlaylist()">Добавить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно переименования плейлиста -->
    <div id="renamePlaylistModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title">Переименовать плейлист</h3>
                <button class="modal-close" onclick="closeRenamePlaylistModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-field">
                    <label for="modalRenameInput">Новое название</label>
                    <input type="text" id="modalRenameInput" class="modal-input" placeholder="Название плейлиста" autocomplete="off">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-cancel" onclick="closeRenamePlaylistModal()">Отмена</button>
                <button class="btn-modal btn-modal-submit" onclick="submitRenamePlaylist()">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно удаления плейлиста -->
    <div id="deletePlaylistModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title">Удалить плейлист?</h3>
                <button class="modal-close" onclick="closeDeletePlaylistModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin: 0; font-size: 0.95rem; color: var(--text-secondary);">Это действие нельзя отменить.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-cancel" onclick="closeDeletePlaylistModal()">Отмена</button>
                <button class="btn-modal btn-modal-submit btn-modal-danger" onclick="submitDeletePlaylist()">Удалить</button>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="auth-widget.css">
    <script type="module" src="nav-widget.js"></script>
    <script type="module" src="auth-widget.js"></script>
    <script type="module" src="header.js"></script>

</body>
