<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eleven Reader | Minimalist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 20px 60px 20px;
        }

        /* --- Header & Accounts --- */
        .reader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .user-info { font-size: 0.9rem; text-align: right; color: var(--text-secondary); }
        .credits-val { color: var(--accent); font-weight: bold; }

        /* --- Global Setup --- */
        .setup-panel {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }

        label { display: block; font-size: 0.75rem; margin-bottom: 8px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            outline: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn:disabled { background: var(--disabled); cursor: wait; transform: none; }

        /* --- Pages --- */
        .page-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .page-text {
            font-size: 1.1rem;
            margin-bottom: 30px;
            white-space: pre-wrap;
            color: var(--text);
            line-height: 1.7;
        }

        .action-area {
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .voice-btn {
            background: var(--accent);
            color: #ffffff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
        .voice-btn:hover { background: var(--accent-hover); }

        .player-wrap { flex: 1; display: none; }
        audio { width: 100%; height: 40px; outline: none; }

        /* --- Utilities --- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            z-index: 999;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- Универсальная шапка сайта -->
    <link rel="stylesheet" href="theme.css">
    <div id="header-container"></div>

    <div class="container">
        <header class="reader-header">
            <h2>Eleven Reader</h2>
            <div class="user-info" id="account-status">
                <span id="eleven-account">Загрузка ключа...</span><br>
                Кредиты: <span id="credits-spent" class="credits-val">0 / 0</span>
            </div>
        </header>

        <section class="setup-panel">
            <div class="form-row">
                <div style="grid-column: span 2;">
                    <label>Eleven Labs API Key</label>
                    <input type="password" id="api-key" placeholder="Вставьте ключ сюда...">
                </div>
            </div>
            <div class="form-row">
                <div style="grid-column: span 1;">
                    <label>Ссылка на Google Doc</label>
                    <input type="text" id="doc-url" placeholder="https://docs.google.com/document/d/...">
                </div>
                <div style="display: flex; align-items: flex-end; gap: 10px;">
                    <button id="load-btn" class="btn" style="flex: 1;">Загрузить документ</button>
                </div>
            </div>
        </section>

        <div id="pages-container">
            <!-- Сюда попадут страницы -->
            <div style="text-align: center; padding: 50px; color: var(--text-dim);">
                Документ не загружен. Убедитесь, что он доступен всем по ссылке.
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Universal Nav, Auth & Header Modules -->
    <link rel="stylesheet" href="auth-widget.css">
    <script type="module" src="nav-widget.js"></script>
    <script type="module" src="auth-widget.js"></script>
    <script type="module" src="header.js"></script>

    <script>
        // Core elements
        const apiKeyInput = document.getElementById('api-key');
        const docUrlInput = document.getElementById('doc-url');
        const loadBtn = document.getElementById('load-btn');
        const pagesContainer = document.getElementById('pages-container');
        const toast = document.getElementById('toast');

        // State & Persistence
        const savedKey = localStorage.getItem('elevenlabs_api_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            initializeInfo();
        }

        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('elevenlabs_api_key', apiKeyInput.value);
            initializeInfo();
        });

        async function initializeInfo() {
            const key = apiKeyInput.value.trim();
            if(!key) return;
            
            try {
                // User & Credits
                const userRes = await fetch('https://api.elevenlabs.io/v1/user', { headers: { 'xi-api-key': key }});
                if(userRes.ok) {
                    const data = await userRes.json();
                    document.getElementById('eleven-account').textContent = data.first_name || 'Аккаунт';
                    const used = data.subscription?.character_count || 0;
                    const limit = data.subscription?.character_limit || 10000;
                    const remaining = limit - used;
                    document.getElementById('credits-spent').textContent = `${remaining.toLocaleString()} доступно`;
                } else {
                    document.getElementById('eleven-account').textContent = 'Ошибка';
                    document.getElementById('credits-spent').textContent = 'Неверный API Ключ';
                }

                // Voices fetching disabled: hardcoded to Jana per user request

            } catch(e) { console.error(e); }
        }

        function showToast(txt) {
            toast.textContent = txt;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // Logic: Loading Document
        loadBtn.addEventListener('click', async () => {
            const url = docUrlInput.value.trim();
            if (!url) return showToast('Введите ссылку!');
            const mid = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            if (!mid) return showToast('Некорректная ссылка');

            loadBtn.disabled = true;
            loadBtn.textContent = 'Загрузка...';
            
            const exportUrl = `https://docs.google.com/document/d/${mid[1]}/export?format=txt`;
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(exportUrl)}`,
                `https://thingproxy.freeboard.io/fetch/${exportUrl}`,
                `https://corsproxy.io/?${encodeURIComponent(exportUrl)}`
            ];

            let content = null;
            for (const p of proxies) {
                try {
                    const r = await fetch(p + (p.includes('?') ? '&' : '?') + 't=' + Date.now());
                    if (r.ok) {
                        const txt = await r.text();
                        if (txt.length > 30 && !txt.includes('<!DOCTYPE html>')) { content = txt; break; }
                    }
                } catch(e) {}
            }

            if (content) {
                renderDoc(content);
                showToast('Текст загружен');
            } else {
                showToast('Ошибка загрузки. Проверьте доступ к ссылке.');
            }
            loadBtn.disabled = false;
            loadBtn.textContent = 'Загрузить документ';
        });

        // Smart Renderer
        function renderDoc(fullText) {
            pagesContainer.innerHTML = '';
            // Remove BOM and normalize
            let text = fullText.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            
            const chunks = [];

            // Разбиваем текст по строке из подчеркиваний (5 и более подряд)
            const parts = text.split(/_{5,}/);
            parts.forEach(p => {
                if(p.trim()) chunks.push(p.trim());
            });

            if (chunks.length === 0 && text.trim()) chunks.push(text.trim());

            chunks.forEach((chunk, i) => {
                const card = document.createElement('div');
                card.className = 'page-card';
                card.innerHTML = `
                    <div class="page-header">Страница ${i+1} <span style="margin-left:10px; opacity:0.5;">(${chunk.length} симв.)</span></div>
                    <div class="page-text">${chunk.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>
                    <div class="action-area">
                        <button class="voice-btn" title="Озвучить" id="vbtn-${i}">▶</button>
                        <div class="player-wrap" id="p-wrap-${i}"><audio controls></audio></div>
                        <div class="voice-err" id="err-${i}" style="color:#ef4444; font-size:0.8rem; display:none;"></div>
                    </div>
                `;
                pagesContainer.appendChild(card);
                
                const b = document.getElementById(`vbtn-${i}`);
                b.onclick = () => speakPage(chunk, i, b);

                const k = apiKeyInput.value.trim();
                // Auto-load audio from local cache or Firebase if it exists!
                getAudioFromCache(chunk, k).then(cachedBlob => {
                    if (cachedBlob) {
                        b.textContent = '✅';
                        b.style.background = '#10b981'; // Green
                        setupPlayer(cachedBlob, i, false);
                    }
                });
            });
        }
        
        // Setup Player UI
        function setupPlayer(blob, idx, autoPlay) {
            const url = URL.createObjectURL(blob);
            const wrap = document.getElementById(`p-wrap-${idx}`);
            const audio = wrap.querySelector('audio');
            audio.src = url;
            
            // Add Download Button dynamically
            let dlBtn = wrap.querySelector('.dl-btn');
            if(!dlBtn) {
                dlBtn = document.createElement('a');
                dlBtn.className = 'dl-btn';
                dlBtn.style.cssText = 'background: #334155; color: white; padding: 0 15px; margin-left: 15px; text-decoration: none; border-radius: 6px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold;';
                dlBtn.innerHTML = '⬇️ Скачать';
                wrap.style.display = 'flex';
                wrap.appendChild(dlBtn);
            }
            dlBtn.href = url;
            dlBtn.download = `DocuVoice_Page_${idx+1}.mp3`;

            if (autoPlay) audio.play();
        }

        async function speakPage(txt, idx, btn) {
            const errDiv = document.getElementById(`err-${idx}`);
            errDiv.style.display = 'none';

            const k = apiKeyInput.value.trim();

            // Check cache FIRST to save credits and time
            const cachedBlob = await getAudioFromCache(txt, k);
            if (cachedBlob) {
                setupPlayer(cachedBlob, idx, true);
                btn.textContent = '✅';
                btn.style.background = '#10b981';
                showToast('Воспроизведено из кэша!');
                return;
            }

            const vid = "XrExE9yKIg1WjnnlVkGX"; // Хардкод: Matilda (Стандартный голос, работает на Free-тарифе)
            
            if(!k) return showToast('Настройте API ключ');

            btn.textContent = '...';
            btn.style.opacity = '0.5';

            try {
                const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`, {
                    method: 'POST',
                    headers: { 
                        'xi-api-key': k, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        text: txt.substring(0, 4999), 
                        model_id: "eleven_multilingual_v2",
                        voice_settings: {
                            stability: 0.5,
                            similarity_boost: 0.75
                        }
                    })
                });

                if(!res.ok) {
                    const errorJson = await res.json();
                    let msg = 'Ошибка API';
                    if (errorJson.detail) {
                        msg = errorJson.detail.message || errorJson.detail;
                    } else if (errorJson.message) {
                        msg = errorJson.message;
                    }
                    throw new Error(msg);
                }

                // Извлекаем уникальный ID генерации из заголовков ответа
                const historyId = res.headers.get('history-item-id');
                const blob = await res.blob();
                
                // Save generated audio to local and Firebase cache
                const hash = await hashText(txt);
                await saveAudioToCacheLocal(hash, blob);
                if (historyId) {
                    await saveAudioToFirebaseSync(hash, historyId);
                }
                
                setupPlayer(blob, idx, true);
                btn.textContent = '✅';
                btn.style.background = '#10b981';
                
                // Refresh credits after successful generation
                initializeInfo();
            } catch(e) {
                console.error(e);
                errDiv.textContent = e.message;
                errDiv.style.display = 'block';
                showToast('Ошибка озвучки');
                btn.textContent = '▶';
            } finally {
                btn.style.opacity = '1';
            }
        }

        // --- Caching Logic (IndexedDB) ---
        const DB_NAME = 'ElevenReaderCache';
        const STORE_NAME = 'audioStore';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function hashText(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function saveAudioToCacheLocal(hash, blob) {
            try {
                const db = await initDB();
                return new Promise((resolve) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put(blob, hash);
                    tx.oncomplete = () => resolve(true);
                });
            } catch(e) { return false; }
        }

        async function saveAudioToFirebaseSync(hash, historyId) {
            if (window.db && window.setDoc && window.doc && historyId) {
                try {
                    await window.setDoc(window.doc(window.db, "eleven_cache", hash), {
                        history_item_id: historyId,
                        created_at: window.serverTimestamp ? window.serverTimestamp() : Date.now()
                    }, { merge: true });
                } catch (e) { console.error("Firebase sync error:", e); }
            }
        }

        async function getAudioFromCache(text, apiKey) {
            try {
                const hash = await hashText(text);

                // 1. Быстрый поиск в IndexedDB (если файл уже на этом устройстве)
                const db = await initDB();
                const localBlob = await new Promise((resolve) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const req = tx.objectStore(STORE_NAME).get(hash);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null);
                });
                
                if (localBlob) return localBlob;

                // 2. Если нет на ПК, спрашиваем у Firebase (может мы создали это на телефоне?)
                if (window.db && window.getDoc && window.doc && apiKey) {
                    const cacheDoc = await window.getDoc(window.doc(window.db, "eleven_cache", hash));
                    
                    if (cacheDoc.exists()) {
                        const historyId = cacheDoc.data().history_item_id;
                        if (historyId) {
                            // Качаем файл из безлимитной истории ElevenLabs без кредитов!
                            const res = await fetch(`https://api.elevenlabs.io/v1/history/${historyId}/audio`, {
                                headers: { 'xi-api-key': apiKey }
                            });
                            
                            if (res.ok) {
                                const fbBlob = await res.blob();
                                // Сохраняем в браузер, чтобы больше не стучаться в сеть
                                await saveAudioToCacheLocal(hash, fbBlob);
                                return fbBlob;
                            }
                        }
                    }
                }

                return null;
            } catch(e) { 
                console.error("Cache Check Error:", e);
                return null; 
            }
        }
    </script>
</body>
</html>
