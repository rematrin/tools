<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eleven Reader | Minimalist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Глобальные стили и сохранение темы -->
    <link rel="stylesheet" href="theme.css">
    <script src="theme-loader.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 20px 60px 20px;
        }

        /* --- Header & Accounts --- */
        .reader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .user-info { font-size: 0.9rem; text-align: right; color: var(--text-secondary); }
        .credits-val { color: var(--accent); font-weight: bold; }

        /* --- Global Setup --- */
        .setup-panel {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }

        label { display: block; font-size: 0.75rem; margin-bottom: 8px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            outline: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn:disabled { background: var(--disabled); cursor: wait; transform: none; }

        /* --- Pages --- */
        .page-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .page-text {
            font-size: 1.1rem;
            margin-bottom: 30px;
            white-space: pre-wrap;
            color: var(--text);
            line-height: 1.7;
        }

        .action-area {
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .voice-btn {
            background: var(--accent);
            color: #ffffff;
            border: none;
            height: 40px;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s;
            font-family: inherit;
        }
        .voice-btn:hover { background: var(--accent-hover); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }

        .player-wrap { flex: 1; display: none; }
        audio { width: 100%; height: 40px; outline: none; }

        /* Custom Select */
        .custom-select-wrapper { position: relative; flex: 1; user-select: none; }
        .custom-select {
            padding: 14px 16px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); border-radius: 10px; font-size: 0.95rem; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            min-height: 48px; box-sizing: border-box; text-align: left;
        }
        .custom-select::after {
            content: "▼"; font-size: 0.7rem; opacity: 0.5; transition: transform 0.2s;
        }
        .custom-select.active::after { transform: rotate(180deg); }
        .custom-options {
            position: absolute; top: calc(100% + 5px); left: 0; right: 0;
            background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 100; text-align: left;
            max-height: 250px; overflow-y: auto; display: none; flex-direction: column;
        }
        .custom-options.show { display: flex; }
        .custom-option {
            padding: 12px 16px; color: var(--text); cursor: pointer; transition: background 0.2s;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .custom-option.selected { font-weight: bold; color: var(--accent); }
        .custom-option:hover { background: var(--border); }

        /* --- Utilities --- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            z-index: 999;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- Универсальная шапка сайта -->
    <div id="header-container"></div>

    <div class="container">
        <header class="reader-header">
            <h2>Eleven Reader</h2>
            <div class="user-info" id="account-status">
                <span id="eleven-account">Загрузка ключа...</span><br>
                Кредиты: <span id="credits-spent" class="credits-val">0 / 0</span>
            </div>
        </header>

        <section class="setup-panel">
            <div class="form-row">
                <div style="grid-column: span 2;">
                    <label>Eleven Labs API Key</label>
                    <div style="display: flex; gap: 10px;">
                        <div class="custom-select-wrapper" id="api-key-wrapper" tabindex="0">
                            <div class="custom-select" id="api-key-display">-- Выберите ключ --</div>
                            <div class="custom-options" id="api-key-options"></div>
                        </div>
                        <button id="add-key-btn" class="btn" style="width: auto; padding: 0 15px; background: var(--border); color: var(--text); display:flex; align-items:center; justify-content:center;" title="Добавить новый ключ">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        <button id="delete-key-btn" class="btn" style="width: auto; padding: 0 15px; background: var(--border); color: var(--text); display:flex; align-items:center; justify-content:center;" title="Удалить выбранный ключ из списка">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div style="grid-column: span 2;">
                    <label>Ссылка на Google Doc</label>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <div class="custom-select-wrapper" id="doc-wrapper" tabindex="0" style="min-width: 200px;">
                            <div class="custom-select" id="doc-display">-- Выберите документ --</div>
                            <div class="custom-options" id="doc-options"></div>
                        </div>
                        <button id="add-doc-btn" class="btn" style="width: auto; padding: 0 15px; background: var(--border); color: var(--text); display:flex; align-items:center; justify-content:center;" title="Добавить новую ссылку">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        <button id="delete-doc-btn" class="btn" style="width: auto; padding: 0 15px; background: var(--border); color: var(--text); display:flex; align-items:center; justify-content:center;" title="Удалить выбранный документ из списка">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                        <button id="load-btn" class="btn" style="width: auto; padding: 0 25px;">Загрузить</button>
                    </div>
                </div>
            </div>
        </section>

        <div id="pages-container">
            <!-- Сюда попадут страницы -->
            <div style="text-align: center; padding: 10px 20px 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; user-select: none;">
                <svg width="180" height="130" viewBox="0 0 220 160" fill="none" style="margin-bottom: 16px; pointer-events: none;">
                    <!-- Blob background -->
                    <path d="M60 130C35 120 20 85 45 60C70 35 110 20 145 35C180 50 205 90 190 120C175 150 100 150 60 130Z" fill="var(--card-bg)" />
                    <!-- Document Base -->
                    <rect x="80" y="30" width="60" height="85" rx="6" fill="var(--bg)" stroke="var(--border)" stroke-width="2.5"/>
                    <!-- Lines -->
                    <line x1="95" y1="50" x2="125" y2="50" stroke="var(--border)" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="95" y1="65" x2="125" y2="65" stroke="var(--border)" stroke-width="2.5" stroke-linecap="round"/>
                    <line x1="95" y1="80" x2="115" y2="80" stroke="var(--border)" stroke-width="2.5" stroke-linecap="round"/>
                    <!-- Accent Check/Audio Element -->
                    <circle cx="150" cy="95" r="18" fill="var(--accent)" opacity="0.1"/>
                    <circle cx="150" cy="95" r="7" fill="var(--accent)"/>
                    <!-- Small decorative elements -->
                    <path d="M45 40 l 6 -6 l 6 6" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
                    <circle cx="180" cy="45" r="3" fill="var(--border)"/>
                    <circle cx="60" cy="100" r="2" fill="var(--border)"/>
                    <!-- Sound waves around accent circle -->
                    <path d="M162 105 A 12 12 0 0 0 162 85" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" fill="none"/>
                    <path d="M168 110 A 18 18 0 0 0 168 80" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
                </svg>
                <h3 style="color: var(--text); font-size: 1.3rem; margin: 0 0 10px 0; font-weight: 600;">Документ не загружен</h3>
                <p style="color: var(--text-dim); font-size: 0.95rem; max-width: 380px; margin: 0 auto; line-height: 1.6;">Убедитесь, что ссылка правильная и доступна всем. Выберите документ из списка и нажмите «Загрузить».</p>
            </div>
        </div>

        <div id="toast" class="toast">Сохранено</div>
    </div>

    <!-- Модальное окно для добавления ключа -->
    <div id="key-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(4px);">
        <div class="setup-panel" style="margin: 0; width: 400px; max-width: 90%; position: relative; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <button id="close-key-modal" style="position:absolute; top: 15px; right: 20px; background:transparent; border:none; color:var(--text-secondary); cursor:pointer; font-size: 1.5rem; transition: color 0.2s;">&times;</button>
            <h3 style="margin-bottom: 20px; font-size: 1.2rem; margin-top:0;">Добавить API Ключ</h3>
            
            <label style="margin-bottom: 5px; opacity: 0.8;">API Ключ (ElevenLabs)</label>
            <input type="password" id="new-key-value" placeholder="sk_..." style="margin-bottom: 20px;">
            
            <label style="margin-bottom: 5px; opacity: 0.8;">Имя профиля</label>
            <input type="text" id="new-key-name" placeholder="Например: Мой Аккаунт" style="margin-bottom: 30px;">
            
            <button id="save-new-key-btn" class="btn">Сохранить</button>
        </div>
    </div>

    <!-- Модальное окно для добавления документа -->
    <div id="doc-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(4px);">
        <div class="setup-panel" style="margin: 0; width: 400px; max-width: 90%; position: relative; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <button id="close-doc-modal" style="position:absolute; top: 15px; right: 20px; background:transparent; border:none; color:var(--text-secondary); cursor:pointer; font-size: 1.5rem; transition: color 0.2s;">&times;</button>
            <h3 style="margin-bottom: 20px; font-size: 1.2rem; margin-top:0;">Добавить Документ</h3>
            
            <label style="margin-bottom: 5px; opacity: 0.8;">Ссылка на Google Doc</label>
            <input type="text" id="new-doc-value" placeholder="https://docs.google.com/document/d/..." style="margin-bottom: 20px;">
            
            <label style="margin-bottom: 5px; opacity: 0.8;">Название (для списка)</label>
            <input type="text" id="new-doc-name" placeholder="Например: Биология (Глава 1)" style="margin-bottom: 30px;">
            
            <button id="save-new-doc-btn" class="btn">Сохранить</button>
        </div>
    </div>

    <!-- Универсальное окно подтверждения (Confirm) -->
    <div id="confirm-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(4px);">
        <div class="setup-panel" style="margin: 0; width: 350px; max-width: 90%; position: relative; padding: 30px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <h3 id="confirm-modal-title" style="margin-bottom: 20px; font-size: 1.2rem; margin-top:0;">Подтверждение</h3>
            <p id="confirm-modal-text" style="color: var(--text-dim); margin-bottom: 30px;"></p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="confirm-cancel-btn" class="btn" style="background: var(--border); color: var(--text);">Отмена</button>
                <button id="confirm-ok-btn" class="btn" style="background: #e74c3c;">Удалить</button>
            </div>
        </div>
    </div>

    <!-- Universal Nav, Auth & Header Modules -->
    <link rel="stylesheet" href="auth-widget.css">
    <script type="module" src="nav-widget.js"></script>
    <script type="module" src="auth-widget.js"></script>
    <script type="module" src="header.js"></script>

    <script>
        // Core elements
        const loadBtn = document.getElementById('load-btn');
        const pagesContainer = document.getElementById('pages-container');
        const toast = document.getElementById('toast');

        function customConfirm(title, text, confirmBtnText = 'OK') {
            return new Promise((resolve) => {
                const overlay = document.getElementById('confirm-modal-overlay');
                document.getElementById('confirm-modal-title').textContent = title;
                document.getElementById('confirm-modal-text').textContent = text;
                
                const okBtn = document.getElementById('confirm-ok-btn');
                const cancelBtn = document.getElementById('confirm-cancel-btn');
                okBtn.textContent = confirmBtnText;

                const newOkBtn = okBtn.cloneNode(true);
                const newCancelBtn = cancelBtn.cloneNode(true);
                okBtn.replaceWith(newOkBtn);
                cancelBtn.replaceWith(newCancelBtn);
                
                overlay.style.display = 'flex';
                
                newOkBtn.addEventListener('click', () => { overlay.style.display = 'none'; resolve(true); });
                newCancelBtn.addEventListener('click', () => { overlay.style.display = 'none'; resolve(false); });
                overlay.onclick = (e) => { if (e.target === overlay) { overlay.style.display = 'none'; resolve(false); } };
            });
        }

        function renderCustomSelect(wrapperId, displayId, optionsId, items, activeValue, onChangeCallback) {
            const display = document.getElementById(displayId);
            const optionsContainer = document.getElementById(optionsId);
            const wrapper = document.getElementById(wrapperId);
            
            optionsContainer.innerHTML = '';
            
            let activeItem = items.find(i => i.value === activeValue);
            display.textContent = activeItem ? activeItem.label : '-- Выберите из списка --';

            if (items.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'custom-option';
                empty.textContent = 'Пусто. Добавьте новый.';
                empty.style.opacity = '0.5';
                empty.style.cursor = 'default';
                optionsContainer.appendChild(empty);
            } else {
                items.forEach(item => {
                    const opt = document.createElement('div');
                    opt.className = 'custom-option' + (item.value === activeValue ? ' selected' : '');
                    opt.textContent = item.label;
                    opt.addEventListener('click', (e) => {
                        e.stopPropagation();
                        display.textContent = item.label;
                        optionsContainer.classList.remove('show');
                        wrapper.querySelector('.custom-select').classList.remove('active');
                        Array.from(optionsContainer.children).forEach(c => c.classList.remove('selected'));
                        opt.classList.add('selected');
                        onChangeCallback(item.value);
                    });
                    optionsContainer.appendChild(opt);
                });
            }

            display.onclick = (e) => {
                e.stopPropagation();
                const isShowing = optionsContainer.classList.contains('show');
                document.querySelectorAll('.custom-options').forEach(el => el.classList.remove('show'));
                document.querySelectorAll('.custom-select').forEach(el => el.classList.remove('active'));
                if (!isShowing) {
                    optionsContainer.classList.add('show');
                    display.classList.add('active');
                }
            };
        }
        
        document.addEventListener('click', () => {
            document.querySelectorAll('.custom-options').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.custom-select').forEach(el => el.classList.remove('active'));
        });

        // State & Persistence for Multiple Keys
        let savedKeys = JSON.parse(localStorage.getItem('eleven_keys') || '[]');
        let activeKey = localStorage.getItem('eleven_active_key') || '';

        // State & Persistence for Multiple Docs
        let savedDocs = JSON.parse(localStorage.getItem('eleven_docs') || '[]');
        let activeDoc = localStorage.getItem('eleven_active_doc') || '';

        // Миграция старого одинарного ключа
        const oldKey = localStorage.getItem('eleven_key');
        if (oldKey && savedKeys.length === 0) {
            savedKeys.push({ name: 'Основной', key: oldKey });
            activeKey = oldKey;
            localStorage.setItem('eleven_keys', JSON.stringify(savedKeys));
            localStorage.setItem('eleven_active_key', activeKey);
            localStorage.removeItem('eleven_key');
        }

        function renderKeyDropdown() {
            if (!activeKey && savedKeys.length > 0) {
                activeKey = savedKeys[0].key;
                localStorage.setItem('eleven_active_key', activeKey);
            }
            const items = savedKeys.map(k => ({ value: k.key, label: k.name }));
            renderCustomSelect('api-key-wrapper', 'api-key-display', 'api-key-options', items, activeKey, async (val) => {
                activeKey = val;
                localStorage.setItem('eleven_active_key', activeKey);
                initializeInfo();
                await syncDataToFirebase();
            });
        }
        
        function renderDocDropdown() {
            if (!activeDoc && savedDocs.length > 0) {
                activeDoc = savedDocs[0].url;
                localStorage.setItem('eleven_active_doc', activeDoc);
            }
            const items = savedDocs.map(d => ({ value: d.url, label: d.name }));
            renderCustomSelect('doc-wrapper', 'doc-display', 'doc-options', items, activeDoc, async (val) => {
                activeDoc = val;
                localStorage.setItem('eleven_active_doc', activeDoc);
                await syncDataToFirebase();
            });
        }
        
        renderKeyDropdown();
        renderDocDropdown();
        if (activeKey) initializeInfo();

        // Delete Handlers
        document.getElementById('delete-key-btn').addEventListener('click', async () => {
            if (!activeKey) return showToast('Сначала выберите ключ!');
            const confirmed = await customConfirm('Удаление ключа', 'Точно удалить выделенный ключ из списка?', 'Удалить');
            if (confirmed) {
                savedKeys = savedKeys.filter(k => k.key !== activeKey);
                activeKey = savedKeys.length > 0 ? savedKeys[0].key : '';
                localStorage.setItem('eleven_keys', JSON.stringify(savedKeys));
                localStorage.setItem('eleven_active_key', activeKey);
                renderKeyDropdown();
                initializeInfo();
                await syncDataToFirebase();
                showToast('Ключ удален');
            }
        });

        document.getElementById('delete-doc-btn').addEventListener('click', async () => {
            if (!activeDoc) return showToast('Сначала выберите документ!');
            const confirmed = await customConfirm('Удаление документа', 'Точно удалить выделенный документ из списка?', 'Удалить');
            if (confirmed) {
                savedDocs = savedDocs.filter(d => d.url !== activeDoc);
                activeDoc = savedDocs.length > 0 ? savedDocs[0].url : '';
                localStorage.setItem('eleven_docs', JSON.stringify(savedDocs));
                localStorage.setItem('eleven_active_doc', activeDoc);
                renderDocDropdown();
                await syncDataToFirebase();
                showToast('Документ удален');
            }
        });

        // Работа с модальным окном (Ключи)
        const keyModal = document.getElementById('key-modal-overlay');
        const keyNameInput = document.getElementById('new-key-name');
        const keyValueInput = document.getElementById('new-key-value');

        document.getElementById('add-key-btn').addEventListener('click', () => {
            keyNameInput.value = '';
            keyValueInput.value = '';
            keyModal.style.display = 'flex';
            setTimeout(() => keyValueInput.focus(), 100);
        });

        document.getElementById('close-key-modal').addEventListener('click', () => {
            keyModal.style.display = 'none';
        });

        keyModal.addEventListener('click', (e) => {
            if (e.target === keyModal) keyModal.style.display = 'none';
        });

        document.getElementById('save-new-key-btn').addEventListener('click', async () => {
            const newKey = keyValueInput.value.replace(/\s/g, ''); // Жестко вырезаем все пробелы, табуляции и переносы строк внутри ключа

        // Умный рендер текста для красивого отображения, чтобы было похоже на Google Docs
        function formatTxtToHtml(rawTxt) {
            let escaped = rawTxt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            let lines = escaped.split('\n');
            let html = '';
            let inList = false;

            for (let i = 0; i < lines.length; i++) {
                let rawLine = lines[i];
                let line = rawLine.trim();
                
                // Пустая строка
                if (!line) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<div style="height:12px;"></div>';
                    continue;
                }

                // Пункт списка (начинается с *, - или •)
                let isList = line.match(/^[\*\-•]\s+(.*)/);
                
                let mergedText = isList ? isList[1] : line;
                let lastRawLength = rawLine.trimEnd().length; // FIX: Только trimEnd(), чтобы Гугловские пробелы до текста учитывались!
                let j = i + 1;

                // Склеиваем разорванные Гуглом строки абзаца
                while (j < lines.length) {
                    let nextRawLine = lines[j];
                    let nextLine = nextRawLine.trim();
                    if (!nextLine) break; // конец абзаца
                    if (nextLine.match(/^[\*\-•]\s+/)) break; // начинается новый пункт списка
                    
                    // Херистика 1: если предыдущая строка была короче 50 символов (включая левые отступы), 
                    // то Гугл бы её не переносил. Значит это конец блока!
                    if (lastRawLength < 50) break;
                    
                    // Херистика 2: Если следующая строка выглядит как заголовок (короткая, с Большой буквы/цифры, без точки в конце)
                    if (nextLine.length < 60 && nextLine.match(/^[A-ZА-ЯČŘŠŽÝÁÍÉÚŮŤĎŇ0-9]/) && !nextLine.match(/[\.,;]$/)) {
                        break;
                    }

                    // Херистика 3: Если следующая строка это словарное определение (Termin - desc)
                    if (nextLine.match(/^[A-ZА-ЯČŘŠŽÝÁÍÉÚŮŤĎŇ0-9][A-Za-zа-яА-Яčřšžýáíéúůďťň0-9\s]{1,40}(\s?\-\s|\s?\—\s|:\s)/)) {
                        break;
                    }
                    
                    mergedText += ' ' + nextLine;
                    lastRawLength = nextRawLine.trimEnd().length;
                    j++;
                }
                i = j - 1; // Пропускаем склеенные строки

                if (isList) {
                    if (!inList) { html += '<ul style="margin-left: 20px; list-style-type: disc; margin-bottom: 5px;">'; inList = true; }
                    
                    // Выделяем жирным термин до первой скобки или тире
                    let formattedListItem = mergedText.replace(/^([^\(—\-:]+)(\s[\(\-—:]|:)/, '<strong>$1</strong>$2');
                    html += `<li style="margin-bottom: 8px;">${formattedListItem}</li>`;
                } else {
                    if (inList) { html += '</ul>'; inList = false; }
                    
                    // Эвристика заголовков: короткая строка, нет точки в конце
                    if (mergedText.length < 80 && !mergedText.match(/[\.,;]$/)) {
                        html += `<div style="font-weight: 700; font-size: 1.15em; margin-bottom: 10px; margin-top: 15px; color: var(--text);">${mergedText}</div>`;
                    } else if (mergedText.match(/:$/) && mergedText.length < 80) {
                        html += `<div style="font-weight: 700; margin-bottom: 8px; margin-top: 15px;">${mergedText}</div>`;
                    } else {
                        // Обычный абзац. Выделяем жирным слово перед тире (как в словаре)
                        let pFormatted = mergedText.replace(/^([A-ZА-ЯČŘŠŽÝÁÍÉÚŮŤĎŇ0-9][a-zа-яčřšžýáíéúůďťňA-ZА-ЯČŘŠŽÝÁÍÉÚŮŤĎŇ0-9\s]{2,50})(\s?\-\s|\s?\—\s|:\s)/i, '<strong>$1</strong>$2');
                        html += `<div style="margin-bottom: 10px;">${pFormatted}</div>`;
                    }
                }
            }
            if (inList) { html += '</ul>'; }
            return html;
        }

        // Smart Renderer
        function renderDoc(fullText) {

            const parts = text.split(/_{5,}/);

            chunks.forEach(async (chunk, i) => {

                        </div>

                            <span>Текст страницы отличается.</span>

                `;
                pagesContainer.appendChild(card);
                
                const b = document.getElementById(`vbtn-${i}`);

                if (regenBtn) {
                     regenBtn.onclick = () => {

                         document.getElementById(`warn-msg-${i}`).style.display = 'none';
                         document.getElementById(`status-msg-${i}`).style.display = 'none';
                         b.style.display = 'flex';
                         speakPage(chunk, i, b, true);
                     };
                }

                const k = activeKey;

                // Auto-load audio from local cache or Firebase if it exists!
                getAudioFromCache(chunk, k).then(result => {

        async function speakPage(txt, idx, btn, force = false) {
            const errDiv = document.getElementById(`err-${idx}`);
            errDiv.style.display = 'none';

            const k = activeKey;
            
            // Check cache FIRST to save credits and time
            if (!force) {
                const cacheResult = await getAudioFromCache(txt, k);
                if (cacheResult && cacheResult.blob) {
                    setupPlayer(cacheResult.blob, idx, true, cacheResult.hash, cacheResult.isTopicMatch);
                    let toastMsg = cacheResult.isTopicMatch ? 'Озвучка подошла по теме документа' : 'Воспроизведено из кэша!';
                    showToast(toastMsg);
                    return;
                }
            }

            const vid = "XrExE9yKIg1WjnnlVkGX"; // Хардкод: Matilda (Стандартный голос, работает на Free-тарифе)
            
            if(!k) return showToast('Настройте API ключ');

            const origHtml = btn.innerHTML;
            btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Генерация...';
            btn.style.opacity = '0.7';

            try {
                const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`, {
                    method: 'POST',
                    headers: { 
                        'xi-api-key': k, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        text: txt.substring(0, 4999), 
                        model_id: "eleven_multilingual_v2",
                        voice_settings: {
                            stability: 0.5,
                            similarity_boost: 0.75
                        }
                    })
                });

                if(!res.ok) {
                    const errorJson = await res.json();
                    let msg = 'Ошибка API';
                    if (errorJson.detail) {
                        msg = errorJson.detail.message || errorJson.detail;
                    } else if (errorJson.message) {
                        msg = errorJson.message;
                    }
                    throw new Error(msg);
                }

                // Извлекаем уникальный ID генерации из заголовков ответа
                const historyId = res.headers.get('history-item-id');
                const blob = await res.blob();
                
                // Save generated audio to local and Firebase cache
                const exactHash = await hashText(txt);
                const match = txt.match(/^\s*(?:\*\*)?(\d{1,2}[A-B]\s*-[^\n\r]+)/i);
                const topicHash = match ? await hashText(match[1].trim()) : null;

                await saveAudioToCacheLocal(exactHash, blob);
                if (topicHash) await saveAudioToCacheLocal(topicHash, blob);

                if (historyId) {
                    await saveAudioToFirebaseSync(exactHash, historyId);
                    if (topicHash) await saveAudioToFirebaseSync(topicHash, historyId);
                }
                
                setupPlayer(blob, idx, true, exactHash, false);
                
                // Refresh credits after successful generation (with slight delay for API to sync)
                setTimeout(() => initializeInfo(), 1500);
            } catch(e) {
                console.error(e);
                errDiv.textContent = e.message;
                errDiv.style.display = 'block';
                showToast('Ошибка озвучки');
                btn.innerHTML = origHtml;
            } finally {
                btn.style.opacity = '1';
            }
        }

        async function deleteAudio(hash, idx) {
            const confirmed = await customConfirm('Удаление озвучки', "Удалить аудио из облака и с устройства? Для восстановления потребуются кредиты ElevenLabs.", 'Удалить');
            if(!confirmed) return;
            
            try {
                // Удаляем из локального браузера
                const db = await initDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).delete(hash);
            } catch(e){}

            // Удаляем связь в Firebase
            if (window.currentUser && window.db && window.doc && window.setDoc) {
                try {
                    await window.setDoc(window.doc(window.db, "users", window.currentUser.uid, "eleven_cache", hash), {
                        history_item_id: null // Аннулируем ссылку на аудио ElevenLabs
                    }, {merge: true});
                } catch(e){}
            }

            // Прячем стили плеера
            const wrap = document.getElementById(`p-wrap-${idx}`);
            wrap.style.display = 'none';
            const audio = wrap.querySelector('audio');
            audio.pause();
            audio.src = '';
            
            // Возвращаем кнопку Play и скрываем статус
            const b = document.getElementById(`vbtn-${idx}`);
            const statusMsg = document.getElementById(`status-msg-${idx}`);
            b.style.display = 'flex';
            statusMsg.style.display = 'none';
            
            showToast("Озвучка удалена");
        }

        // --- Caching Logic (IndexedDB) ---
        const DB_NAME = 'ElevenReaderCache';
        const STORE_NAME = 'audioStore';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function hashText(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function saveAudioToCacheLocal(hash, blob) {
            try {
                const db = await initDB();
                return new Promise((resolve) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put(blob, hash);
                    tx.oncomplete = () => resolve(true);
                });
            } catch(e) { return false; }
        }

        async function saveAudioToFirebaseSync(hash, historyId) {
            if (window.db && window.setDoc && window.doc && historyId) {
                try {
                    // Используем личную коллекцию пользователя, чтобы пройти правила безопасности Firestore
                    let docRef;
                    if (window.currentUser && window.currentUser.uid) {
                        docRef = window.doc(window.db, "users", window.currentUser.uid, "eleven_cache", hash);
                    } else {
                        docRef = window.doc(window.db, "eleven_cache", hash);
                    }
                    
                    await window.setDoc(docRef, {
                        history_item_id: historyId,
                        created_at: window.serverTimestamp ? window.serverTimestamp() : Date.now()
                    }, { merge: true });
                } catch (e) { 
                    console.error("Firebase sync error:", e); 
                    if (typeof showToast === 'function') showToast("Ошибка синхронизации (проверьте БД)", 'error');
                }
            }
        }

        async function getAudioFromCache(text, apiKey) {
            try {
                const exactHash = await hashText(text);
                
                // Helper to perform the DB and Network check for a specific hash
                async function fetchByHash(hash) {
                    const db = await initDB();
                    const localBlob = await new Promise((resolve) => {
                        const tx = db.transaction(STORE_NAME, 'readonly');
                        const req = tx.objectStore(STORE_NAME).get(hash);
                        req.onsuccess = () => resolve(req.result);
                        req.onerror = () => resolve(null);
                    });
                    
                    if (localBlob) return localBlob;

                    if (window.db && window.getDoc && window.doc) {
                        let docRef;
                        if (window.currentUser && window.currentUser.uid) {
                            docRef = window.doc(window.db, "users", window.currentUser.uid, "eleven_cache", hash);
                        } else {
                            docRef = window.doc(window.db, "eleven_cache", hash);
                        }
                        
                        const cacheDoc = await window.getDoc(docRef);
                        
                        if (cacheDoc.exists()) {
                            const historyId = cacheDoc.data().history_item_id;
                            if (historyId) {
                                let keysToTry = apiKey ? [apiKey] : [];
                                if (typeof savedKeys !== 'undefined' && Array.isArray(savedKeys)) {
                                    const otherKeys = savedKeys.map(k => k.key).filter(k => k !== apiKey);
                                    keysToTry = keysToTry.concat(otherKeys);
                                }

                                for (const k of keysToTry) {
                                    if (!k) continue;
                                    const res = await fetch(`https://api.elevenlabs.io/v1/history/${historyId}/audio`, {
                                        headers: { 'xi-api-key': k }
                                    });
                                    
                                    if (res.ok) {
                                        const fbBlob = await res.blob();
                                        await saveAudioToCacheLocal(hash, fbBlob);
                                        return fbBlob;
                                    }
                                }
                            }
                        }
                    }
                    return null;
                }

                // 1. Попытка строгого поиска (если текст не менялся ни на букву)
                let blob = await fetchByHash(exactHash);
                if (blob) return { blob, isTopicMatch: false, hash: exactHash };

                // 2. Попытка нестрогого поиска (по названию темы)
                const match = text.match(/^\s*(?:\*\*)?(\d{1,2}[A-B]\s*-[^\n\r]+)/i);
                if (match) {
                    const topicHash = await hashText(match[1].trim());
                    blob = await fetchByHash(topicHash);
                    if (blob) {
                        return { blob, isTopicMatch: true, hash: topicHash };
                    }
                }

                return null;
            } catch(e) { 
                console.error("Cache Check Error:", e);
                return null; 
            }
        }
    </script>
