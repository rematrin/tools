<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>Скачать YouTube превью</title>
<meta name="description" content="Бесплатный инструмент для скачивания превью (обложек) из YouTube видео в высоком качестве (HD, 4K).">

<meta property="og:type" content="website">
<meta property="og:site_name" content="YouTube Thumbnail Downloader">
<meta property="og:title" content="Скачать YouTube превью">
<meta property="og:description" content="Скачать обложку видео в максимальном качестве.">

<meta property="og:url" content="https://rematrin.github.io/tools/thumbnail/">

<meta property="og:image" content="https://rematrin.github.io/tools/yt2.png?v=3">

<link rel="canonical" href="https://rematrin.github.io/tools/thumbnail/">

<link rel="apple-touch-icon" sizes="180x180" href="https://rematrin.github.io/tools/yt2.png?v=3">
<link rel="icon" type="image/png" sizes="32x32" href="https://rematrin.github.io/tools/yt.png?v=3">
<link rel="icon" type="image/png" sizes="192x192" href="https://rematrin.github.io/tools/yt.png?v=3">
<link rel="shortcut icon" href="https://rematrin.github.io/tools/play.ico?v=3">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "Скачать YouTube превью",
  "url": "https://rematrin.github.io/tools/thumbnail/",
  "image": "https://rematrin.github.io/tools/yt2.png?v=3"
}
</script>

<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f6f7fb;color:#0c0c0d}
  .wrap{max-width:800px;margin:0 auto;padding:22px 14px 40px}
  h1{margin:0 0 14px;font-size:1.4rem;text-align:center}
  .card{background:#fff;border:1px solid #e6e9f2;border-radius:12px;padding:16px;box-shadow:0 1px 0 rgba(0,0,0,.03)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center}
  input[type="url"]{flex:1 1 560px;max-width:760px;padding:12px 14px;font-size:1rem;border:1px solid #cfd5e1;border-radius:10px}
  .preview{margin-top:16px;display:flex;justify-content:center}
  .preview a{display:block;width:100%;max-width:860px}
  .preview img{width:100%;height:auto;border-radius:12px;border:1px solid #e6e9f2;background:#eef2ff}
  .info{margin-top:14px;background:#fbfcff;border:1px solid #e6ecff;border-radius:10px;padding:12px}
  .info .row2{display:grid;gap:6px}
  .k{opacity:.8;min-width:140px;display:inline-block}
  .err{color:#b00020;margin-top:8px}
  .muted{opacity:.7;font-size:.9rem}
</style>
</head>
<body>
<div class="wrap">
  <h1>Скачать YouTube превью</h1>

  <div class="card">
    <div class="row">
      <input id="yturl" type="url" placeholder="Вставьте ссылку на YouTube видео..." autocomplete="off">
    </div>

    <div class="preview" id="out" hidden>
      <a id="thumbLink" target="_blank" rel="noopener">
        <img id="thumb" alt="Превью YouTube">
      </a>
    </div>

    <div id="videoInfo" class="info" hidden>
      <div class="row2" id="infoRows"></div>
      <div id="apiErr" class="err" hidden></div>
    </div>
  </div>
</div>

<script>
  // 🔑 Твой API Key
  const API_KEY = "AIzaSyCeQA2-I2pGKQwStB1TN8NQOQcKdgqc7_0";

  const input = document.getElementById('yturl');
  const out   = document.getElementById('out');
  const img   = document.getElementById('thumb');
  const link  = document.getElementById('thumbLink');
  const infoBox   = document.getElementById('videoInfo');
  const infoRows  = document.getElementById('infoRows');
  const apiErrEl  = document.getElementById('apiErr');
  const placeholder = "https://placehold.co/800x450?text=Вставьте+ссылку,+чтобы+скачать+превью&font=roboto";
 
  img.src = placeholder;
  out.hidden = false;
  link.removeAttribute("href");
  link.style.pointerEvents = "none";
  link.style.cursor = "default";

  function parseYouTubeId(url){
    if (!url) return null;
    try{
      const u = new URL(url.trim());
      if (u.hostname.endsWith('youtu.be')) return u.pathname.split('/')[1] || null;
      if (u.searchParams.get('v')) return u.searchParams.get('v');
      if (u.pathname.startsWith('/shorts/')) return u.pathname.split('/')[2] || null;
      if (u.pathname.startsWith('/embed/'))  return u.pathname.split('/')[2] || null;
      return null;
    }catch{ return null; }
  }

  function formatMoscow(dtISO){
    const d = new Date(dtISO);
    const optsDate = { year:'numeric', month:'long', day:'numeric' };
    const optsTime = { hour:'2-digit', minute:'2-digit' };
    const date = d.toLocaleDateString('ru-RU', {...optsDate, timeZone:'Europe/Moscow'});
    const time = d.toLocaleTimeString('ru-RU', {...optsTime, timeZone:'Europe/Moscow'});
    return `${date} в ${time} по мск`;
  }

  async function fetchVideoMeta(id){
    if (!API_KEY || API_KEY === 'YOUR_API_KEY_HERE') {
      throw new Error('Не указан API ключ.');
    }
    const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) {
      const text = await res.text().catch(()=>res.statusText);
      throw new Error(`API error ${res.status}: ${text}`);
    }
    const data = await res.json();
    if (!data.items || !data.items.length) throw new Error('Видео не найдено');
    const s = data.items[0].snippet || {};
    return {
      title: s.title || '—',
      channel: s.channelTitle || '—',
      publishedAt: s.publishedAt || null
    };
  }

  let t;
  function update(){
    clearTimeout(t);
    t = setTimeout(async ()=>{
      apiErrEl.hidden = true; 
      apiErrEl.textContent = '';
      const id = parseYouTubeId(input.value);

      if (!id){
        img.src = placeholder;
        link.removeAttribute("href");
        link.style.pointerEvents = "none";
        link.style.cursor = "default";
        infoBox.hidden = true;
        return;
      }

      const max = `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`;
      const hq  = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
      img.src = max;
      link.href = max;
      link.style.pointerEvents = "auto";
      link.style.cursor = "pointer";
      img.onerror = () => { 
        img.onerror = null; 
        img.src = hq; 
        link.href = hq; 
      };

      try {
        const meta = await fetchVideoMeta(id);
        const dateStr = meta.publishedAt ? formatMoscow(meta.publishedAt) : '—';
        infoRows.innerHTML = `
          <div><span class="k"><strong>Название:</strong></span> ${escapeHtml(meta.title)}</div>
          <div><span class="k"><strong>Канал:</strong></span> ${escapeHtml(meta.channel)}</div>
          <div><span class="k"><strong>Опубликовано:</strong></span> ${dateStr}</div>
        `;
        infoBox.hidden = false;
      } catch(err) {
        infoBox.hidden = false;
        infoRows.innerHTML = '';
        apiErrEl.textContent = (err && err.message) ? err.message : String(err);
        apiErrEl.hidden = false;
      }
    }, 250);
  }

  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  input.addEventListener('input', update);

  (function(){
    const q = new URLSearchParams(location.search).get('url');
    if (q){ input.value = q; update(); }
  })();
</script>
</body>
</html>
