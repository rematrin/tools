<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eleven Reader | Minimalist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* --- Header & Accounts --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .user-info { font-size: 0.9rem; text-align: right; }
        .credits-val { color: var(--accent); font-weight: bold; }

        /* --- Global Setup --- */
        .setup-panel {
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }

        label { display: block; font-size: 0.8rem; margin-bottom: 6px; color: var(--text-dim); text-transform: uppercase; }
        input, select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #334155; color: #94a3b8; cursor: wait; }

        /* --- Pages --- */
        .page-card {
            background: var(--card);
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .page-text {
            font-size: 1.1rem;
            margin-bottom: 30px;
            white-space: pre-wrap;
        }

        .action-area {
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .voice-btn {
            background: var(--accent);
            color: #000;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-wrap { flex: 1; display: none; }
        audio { width: 100%; height: 40px; }

        /* --- Utilities --- */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #1e293b;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 999;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Eleven Reader</h1>
            <div class="user-info" id="account-status">
                <span id="user-name">Загрузка ключа...</span><br>
                Кредиты: <span id="credits-spent" class="credits-val">0 / 0</span>
            </div>
        </header>

        <section class="setup-panel">
            <div class="form-row">
                <div style="grid-column: span 2;">
                    <label>Eleven Labs API Key</label>
                    <input type="password" id="api-key" placeholder="Вставьте ключ сюда...">
                </div>
            </div>
            <div class="form-row">
                <div style="grid-column: span 1;">
                    <label>Ссылка на Google Doc</label>
                    <input type="text" id="doc-url" placeholder="https://docs.google.com/document/d/...">
                </div>
                <div style="display: flex; align-items: flex-end; gap: 10px;">
                    <button id="load-btn" class="btn" style="flex: 1;">Загрузить документ</button>
                </div>
            </div>
        </section>

        <div id="pages-container">
            <!-- Сюда попадут страницы -->
            <div style="text-align: center; padding: 50px; color: var(--text-dim);">
                Документ не загружен. Убедитесь, что он доступен всем по ссылке.
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Core elements
        const apiKeyInput = document.getElementById('api-key');
        const docUrlInput = document.getElementById('doc-url');
        const loadBtn = document.getElementById('load-btn');
        const pagesContainer = document.getElementById('pages-container');
        const toast = document.getElementById('toast');

        // State & Persistence
        const savedKey = localStorage.getItem('elevenlabs_api_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            initializeInfo();
        }

        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('elevenlabs_api_key', apiKeyInput.value);
            initializeInfo();
        });

        async function initializeInfo() {
            const key = apiKeyInput.value.trim();
            if(!key) return;
            
            try {
                // User & Credits
                const userRes = await fetch('https://api.elevenlabs.io/v1/user', { headers: { 'xi-api-key': key }});
                if(userRes.ok) {
                    const data = await userRes.json();
                    document.getElementById('user-name').textContent = data.first_name || 'Аккаунт';
                    const used = data.subscription?.character_count || 0;
                    const limit = data.subscription?.character_limit || 10000;
                    const remaining = limit - used;
                    document.getElementById('credits-spent').textContent = `${remaining.toLocaleString()} доступно (из ${limit.toLocaleString()})`;
                } else {
                    document.getElementById('user-name').textContent = 'Ошибка';
                    document.getElementById('credits-spent').textContent = 'Неверный API Ключ';
                }

                // Voices fetching disabled: hardcoded to Jana per user request

            } catch(e) { console.error(e); }
        }

        function showToast(txt) {
            toast.textContent = txt;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // Logic: Loading Document
        loadBtn.addEventListener('click', async () => {
            const url = docUrlInput.value.trim();
            if (!url) return showToast('Введите ссылку!');
            const mid = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            if (!mid) return showToast('Некорректная ссылка');

            loadBtn.disabled = true;
            loadBtn.textContent = 'Загрузка...';
            
            const exportUrl = `https://docs.google.com/document/d/${mid[1]}/export?format=txt`;
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(exportUrl)}`,
                `https://thingproxy.freeboard.io/fetch/${exportUrl}`,
                `https://corsproxy.io/?${encodeURIComponent(exportUrl)}`
            ];

            let content = null;
            for (const p of proxies) {
                try {
                    const r = await fetch(p + (p.includes('?') ? '&' : '?') + 't=' + Date.now());
                    if (r.ok) {
                        const txt = await r.text();
                        if (txt.length > 30 && !txt.includes('<!DOCTYPE html>')) { content = txt; break; }
                    }
                } catch(e) {}
            }

            if (content) {
                renderDoc(content);
                showToast('Текст загружен');
            } else {
                showToast('Ошибка загрузки. Проверьте доступ к ссылке.');
            }
            loadBtn.disabled = false;
            loadBtn.textContent = 'Загрузить документ';
        });

        // Smart Renderer
        function renderDoc(fullText) {
            pagesContainer.innerHTML = '';
            // Remove BOM and normalize
            let text = fullText.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            
            const chunks = [];

            // Разбиваем текст по строке из подчеркиваний (5 и более подряд)
            const parts = text.split(/_{5,}/);
            parts.forEach(p => {
                if(p.trim()) chunks.push(p.trim());
            });

            if (chunks.length === 0 && text.trim()) chunks.push(text.trim());

            chunks.forEach((chunk, i) => {
                const card = document.createElement('div');
                card.className = 'page-card';
                card.innerHTML = `
                    <div class="page-header">Страница ${i+1} <span style="margin-left:10px; opacity:0.5;">(${chunk.length} симв.)</span></div>
                    <div class="page-text">${chunk.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>
                    <div class="action-area">
                        <button class="voice-btn" title="Озвучить" id="vbtn-${i}">▶</button>
                        <div class="player-wrap" id="p-wrap-${i}"><audio controls></audio></div>
                        <div class="voice-err" id="err-${i}" style="color:#ef4444; font-size:0.8rem; display:none;"></div>
                    </div>
                `;
                pagesContainer.appendChild(card);
                
                const b = document.getElementById(`vbtn-${i}`);
                b.onclick = () => speakPage(chunk, i, b);

                // Auto-load audio from local cache if it exists!
                getAudioFromCache(chunk).then(cachedBlob => {
                    if (cachedBlob) {
                        b.textContent = '✅';
                        b.style.background = '#10b981'; // Green
                        setupPlayer(cachedBlob, i, false);
                    }
                });
            });
        }
        
        // Setup Player UI
        function setupPlayer(blob, idx, autoPlay) {
            const url = URL.createObjectURL(blob);
            const wrap = document.getElementById(`p-wrap-${idx}`);
            const audio = wrap.querySelector('audio');
            audio.src = url;
            
            // Add Download Button dynamically
            let dlBtn = wrap.querySelector('.dl-btn');
            if(!dlBtn) {
                dlBtn = document.createElement('a');
                dlBtn.className = 'dl-btn';
                dlBtn.style.cssText = 'background: #334155; color: white; padding: 0 15px; margin-left: 15px; text-decoration: none; border-radius: 6px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold;';
                dlBtn.innerHTML = '⬇️ Скачать';
                wrap.style.display = 'flex';
                wrap.appendChild(dlBtn);
            }
            dlBtn.href = url;
            dlBtn.download = `DocuVoice_Page_${idx+1}.mp3`;

            if (autoPlay) audio.play();
        }

        async function speakPage(txt, idx, btn) {
            const errDiv = document.getElementById(`err-${idx}`);
            errDiv.style.display = 'none';

            // Check cache FIRST to save credits and time
            const cachedBlob = await getAudioFromCache(txt);
            if (cachedBlob) {
                setupPlayer(cachedBlob, idx, true);
                btn.textContent = '✅';
                btn.style.background = '#10b981';
                showToast('Воспроизведено из кэша!');
                return;
            }

            const k = apiKeyInput.value.trim();
            const vid = "XrExE9yKIg1WjnnlVkGX"; // Хардкод: Matilda (Стандартный голос, работает на Free-тарифе)
            
            if(!k) return showToast('Настройте API ключ');

            btn.textContent = '...';
            btn.style.opacity = '0.5';

            try {
                const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`, {
                    method: 'POST',
                    headers: { 
                        'xi-api-key': k, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        text: txt.substring(0, 4999), 
                        model_id: "eleven_multilingual_v2",
                        voice_settings: {
                            stability: 0.5,
                            similarity_boost: 0.75
                        }
                    })
                });

                if(!res.ok) {
                    const errorJson = await res.json();
                    let msg = 'Ошибка API';
                    if (errorJson.detail) {
                        msg = errorJson.detail.message || errorJson.detail;
                    } else if (errorJson.message) {
                        msg = errorJson.message;
                    }
                    throw new Error(msg);
                }

                const blob = await res.blob();
                
                // Save generated audio to local cache using IndexedDB!
                await saveAudioToCache(txt, blob);
                
                setupPlayer(blob, idx, true);
                btn.textContent = '✅';
                btn.style.background = '#10b981';
                
                // Refresh credits after successful generation
                initializeInfo();
            } catch(e) {
                console.error(e);
                errDiv.textContent = e.message;
                errDiv.style.display = 'block';
                showToast('Ошибка озвучки');
                btn.textContent = '▶';
            } finally {
                btn.style.opacity = '1';
            }
        }

        // --- Caching Logic (IndexedDB) ---
        const DB_NAME = 'ElevenReaderCache';
        const STORE_NAME = 'audioStore';

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function hashText(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function saveAudioToCache(text, blob) {
            try {
                const db = await initDB();
                const hash = await hashText(text);
                return new Promise((resolve) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put(blob, hash);
                    tx.oncomplete = () => resolve(true);
                });
            } catch(e) { return false; }
        }

        async function getAudioFromCache(text) {
            try {
                const db = await initDB();
                const hash = await hashText(text);
                return new Promise((resolve) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const req = tx.objectStore(STORE_NAME).get(hash);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null);
                });
            } catch(e) { return null; }
        }
    </script>
</body>
</html>
