<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои закладки — Rematrin</title>
    
    <link rel="icon" type="image/svg+xml" href="house-favicon.svg">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="auth-widget.css">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="theme-loader.js"></script>

    <style>
        /* === СТИЛИ ДЛЯ ИНТЕРФЕЙСА ЗАКЛАДОК (BEM & CSS Variables) === */
        :root {
            --sidebar-width: 280px;
            --sidebar-bg-light: #232325; /* Установлен цвет бокового меню */
            --sidebar-bg-dark: #232325; /* Установлен цвет бокового меню */
            --sidebar-text-primary: #ffffff;
            --sidebar-text-muted: #9ba1a6;
            --sidebar-hover-bg: rgba(255, 255, 255, 0.06);
            --sidebar-active-bg: rgba(255, 255, 255, 0.12);
            --sidebar-border: rgba(255, 255, 255, 0.08);
            
            --active-folder-bg: #36373a; /* Цвет выбранного элемента */
            --active-folder-text: #ffffff; /* Цвет текста выбранного элемента */
            
            --content-bg-light: #ffffff;
            --content-bg-dark: #0f1115;
            --content-header-bg: #ffffff;
            --content-header-bg-dark: #1a1d22;
            
            --search-bg-light: #f1f3f5;
            --search-bg-dark: #23262b;
            --search-border: #e6e9f2;
            
            --btn-blue: #1070e5;
            --btn-blue-hover: #0d5ec4;
            
            --list-hover-bg-light: #f8f9fa;
            --list-hover-bg-dark: #1c1f26;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            padding-top: 0; /* Шапка удалена, отступ не нужен */
        }

        /* Системные иконки в темной теме инвертируются */
        body.dark .bookmark-app {
            --content-bg: var(--content-bg-dark);
            --content-header-bg: var(--content-header-bg-dark);
        }

        /* === ОСНОВНОЙ КОНТЕЙНЕР (СЕТКА) === */
        .bookmark-app {
            display: flex;
            width: 100%;
            height: 100vh; /* На всю высоту */
            overflow: hidden;
            position: relative;
        }

        /* === БОКОВАЯ ПАНЕЛЬ (SIDEBAR) === */
        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--sidebar-bg-light);
            color: var(--sidebar-text-primary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--sidebar-border);
            flex-shrink: 0;
            transition: background 0.3s ease, transform 0.3s ease;
            z-index: 100;
            position: relative; /* Для позиционирования ресайзера */
        }

        body.dark .sidebar {
            background: var(--sidebar-bg-dark);
        }

        /* Интерактивный ресайзер боковой панели */
        .sidebar-resize-handle {
            position: absolute;
            top: 0;
            right: -3px; /* Наползает на границу */
            width: 6px;
            height: 100%;
            cursor: col-resize;
            z-index: 1000;
            background: transparent;
            transition: background 0.2s ease, width 0.2s ease, right 0.2s ease;
        }

        .sidebar-resize-handle:hover,
        .sidebar-resize-handle.active {
            background: var(--btn-blue);
            width: 4px;
            right: -2px;
        }

        /* Селектор рабочего пространства / Профиль */
        .sidebar-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--sidebar-border);
        }

        .workspace-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            padding: 6px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .workspace-selector:hover {
            background: var(--sidebar-hover-bg);
        }

        .workspace-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4a5568;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .workspace-name {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon-sidebar {
            background: none;
            border: none;
            color: var(--sidebar-text-muted);
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon-sidebar:hover {
            background: var(--sidebar-hover-bg);
            color: var(--sidebar-text-primary);
        }

        /* Список навигации */
        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* Скроллбар боковой панели */
        .sidebar-menu::-webkit-scrollbar {
            width: 5px;
        }
        .sidebar-menu::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            color: var(--sidebar-text-muted);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        .menu-item:hover {
            background: var(--sidebar-hover-bg);
            color: var(--sidebar-text-primary);
        }

        .menu-item.active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-text-primary);
        }

        /* Выделенная папка - как на скриншоте (Поиск работы) */
        .menu-item.highlighted {
            background: var(--active-folder-bg);
            color: var(--active-folder-text) !important;
            font-weight: 600;
        }

        .menu-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .menu-count {
            font-size: 12px;
            opacity: 0.7;
            font-weight: 500;
        }

        .menu-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--sidebar-text-muted);
            padding: 16px 12px 6px 12px;
            font-weight: 700;
            opacity: 0.6;
        }

        /* Вложенные папки */
        .nested-folders {
            display: flex;
            flex-direction: column;
            gap: 1px;
            padding-left: 12px;
        }

        /* --- PRO БАННЕР В SIDEBAR --- */
        .pro-banner {
            margin: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #2c2543 0%, #151226 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .pro-banner:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .pro-banner-content {
            z-index: 2;
            position: relative;
            max-width: 70%;
        }

        .pro-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .pro-badge {
            display: inline-block;
            background: #ffd700;
            color: #151226;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Визуальный стек карточек справа */
        .pro-cards-visual {
            position: absolute;
            right: -10px;
            bottom: -15px;
            width: 75px;
            height: 75px;
            opacity: 0.85;
            pointer-events: none;
        }

        .visual-card {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 8px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .visual-card-1 {
            background: #ff5e62;
            transform: rotate(-15deg) translate(10px, 15px);
            z-index: 3;
        }

        .visual-card-2 {
            background: #8e2de2;
            transform: rotate(5deg) translate(25px, 10px);
            z-index: 2;
        }

        .visual-card-3 {
            background: #00c6ff;
            transform: rotate(25deg) translate(40px, 20px);
            z-index: 1;
        }

        /* === ОСНОВНАЯ ОБЛАСТЬ (CONTENT) === */
        .main-content {
            flex: 1;
            height: 100%;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* Верхняя панель управления (Header Row) */
        .content-header {
            height: 56px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* Блок поиска */
        .search-container {
            position: relative;
            width: 380px; /* Сделали шире */
            max-width: 100%;
        }

        .search-input {
            width: 100%;
            height: 36px;
            background: var(--search-bg-light);
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 0 16px 0 36px; /* Увеличили полезную площадь ввода */
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: all 0.2s ease;
        }

        body.dark .search-input {
            background: var(--search-bg-dark);
        }

        .search-input:focus {
            background: var(--card-bg);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(122, 162, 255, 0.15);
        }

        .search-icon-left {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        .search-filter-right {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .search-filter-right:hover {
            background: var(--hover-bg);
            color: var(--text);
        }

        /* Кнопки действий справа */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--hover-bg);
            color: var(--text);
        }

        .btn-add-primary {
            background: var(--btn-blue);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(16, 112, 229, 0.2);
            transition: all 0.2s;
        }

        .btn-add-primary:hover {
            background: var(--btn-blue-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 112, 229, 0.3);
        }

        .btn-add-primary:active {
            transform: translateY(0);
        }

        .add-dropdown-arrow {
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding-left: 6px;
            margin-left: 4px;
            display: flex;
            align-items: center;
        }

        /* Подзаголовок папки (Title Row) */
        .title-row {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .folder-title-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .folder-large-icon {
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .folder-large-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            letter-spacing: -0.3px;
        }

        .view-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Список закладок */
        .bookmarks-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 24px 40px 24px;
            display: flex;
            flex-direction: column;
        }

        /* Скроллбар списка */
        .bookmarks-list-container::-webkit-scrollbar {
            width: 8px;
        }
        .bookmarks-list-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .bookmark-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 8px;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .bookmark-row:last-child {
            border-bottom: none;
        }

        .bookmark-row:hover {
            background: var(--list-hover-bg-light);
            border-color: transparent;
        }

        body.dark .bookmark-row:hover {
            background: var(--list-hover-bg-dark);
        }

        .bookmark-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }

        .favicon-wrapper {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        body.dark .favicon-wrapper {
            background: #23262b;
        }

        .bookmark-row:hover .favicon-wrapper {
            transform: scale(1.05);
        }

        .favicon-img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .favicon-fallback {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .bookmark-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .bookmark-title {
            font-size: 14.5px;
            font-weight: 500;
            color: var(--text);
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bookmark-url {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
            opacity: 0.8;
        }

        /* Быстрые действия при наведении */
        .bookmark-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.2s ease;
        }

        .bookmark-row:hover .bookmark-actions {
            opacity: 1;
            transform: translateX(0);
        }

        .btn-action-round {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-action-round:hover {
            background: var(--hover-bg);
            color: var(--text);
            transform: scale(1.08);
        }

        /* Итоговый счетчик внизу списка */
        .bookmarks-footer {
            margin-top: 24px;
            padding: 16px 0;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            opacity: 0.8;
            border-top: 1px dashed var(--border);
        }

        /* Мобильная кнопка меню */
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 8px;
            margin-right: 12px;
            align-items: center;
            justify-content: center;
        }

        /* === ОТЗЫВЧИВЫЙ ДИЗАЙН (RESPONSIVE) === */
        @media (max-width: 900px) {
            .search-container {
                width: 200px;
            }
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: flex;
            }

            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                box-shadow: 4px 0 16px rgba(0,0,0,0.15);
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: none;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.4);
                z-index: 95;
                backdrop-filter: blur(2px);
            }

            .sidebar-overlay.active {
                display: block;
            }

            .search-container {
                display: none; /* Скрываем поиск в шапке на мобилках */
            }

            .bookmark-url {
                max-width: 180px;
            }
            
            .btn-secondary span {
                display: none; /* Убираем текст с кнопок, оставляем иконки */
            }
            .btn-secondary {
                padding: 8px;
            }
        }
    </style>
</head>

<body>

    <!-- Основной интерфейс закладок -->
    <div class="bookmark-app">
        
        <!-- Затемнение для мобильного меню -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Боковая панель (Sidebar) -->
        <aside class="sidebar" id="appSidebar">
            <!-- Ресайзер боковой панели -->
            <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
            
            <!-- Шапка боковой панели -->
            <div class="sidebar-header">
                <div class="workspace-selector" id="workspaceProfileTrigger" title="Профиль пользователя">
                    <div class="workspace-avatar" id="user-avatar-display">R</div>
                    <span class="workspace-name">
                        <span id="user-name-display">rematrin</span>
                        <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <path d="M1 1L5 5L9 1" />
                        </svg>
                    </span>
                </div>
                <button class="btn-icon-sidebar" title="Создать коллекцию">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>

            <!-- Меню навигации и папок -->
            <div class="sidebar-menu">
                
                <!-- Основные системные разделы -->
                <a href="#" class="menu-item" data-folder="all">
                    <div class="menu-item-left">
                        <span class="menu-icon">
                            <!-- Облако / Все закладки -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
                            </svg>
                        </span>
                        <span>Все закладки</span>
                    </div>
                    <span class="menu-count" id="count-all">190</span>
                </a>

                <a href="#" class="menu-item" data-folder="unsorted">
                    <div class="menu-item-left">
                        <span class="menu-icon">
                            <!-- Несортированные (иконка списков) -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="8" y1="6" x2="21" y2="6"></line>
                                <line x1="8" y1="12" x2="21" y2="12"></line>
                                <line x1="8" y1="18" x2="21" y2="18"></line>
                                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                <line x1="3" y1="18" x2="3.01" y2="18"></line>
                            </svg>
                        </span>
                        <span>Несортированные</span>
                    </div>
                    <span class="menu-count" id="count-unsorted">0</span>
                </a>

                <a href="#" class="menu-item" data-folder="trash">
                    <div class="menu-item-left">
                        <span class="menu-icon">
                            <!-- Корзина -->

    <script>
        // === ЛОГИКА СТРАНИЦЫ ЗАКЛАДОК (MOCK DATA & INTERACTIVITY) ===
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- РЕГРУППИРОВКА РАЗМЕРОВ БОКОВОГО МЕНЮ (RESIZABLE SIDEBAR) ---
            const sidebar = document.getElementById('appSidebar');
            const handle = document.getElementById('sidebarResizeHandle');
            
            if (sidebar && handle) {
                let isResizing = false;
                let currentWidth = 280;

                // Загружаем сохраненную ширину бокового меню при запуске
                const savedWidth = localStorage.getItem('sidebarWidth');
                if (savedWidth) {
                    currentWidth = parseInt(savedWidth, 10);
                    document.documentElement.style.setProperty('--sidebar-width', currentWidth + 'px');
                }

                handle.addEventListener('mousedown', (e) => {
                    isResizing = true;
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    handle.classList.add('active');
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizing) return;
                    
                    let newWidth = e.clientX;
                    
                    // Ограничения размеров (min: 200px, max: 450px)
                    if (newWidth < 200) newWidth = 200;
                    if (newWidth > 450) newWidth = 450;
                    
                    currentWidth = newWidth;
                    document.documentElement.style.setProperty('--sidebar-width', currentWidth + 'px');
                });

                document.addEventListener('mouseup', () => {
                    if (isResizing) {
                        isResizing = false;
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        handle.classList.remove('active');
                        
                        // Сохраняем ширину в память браузера
                        localStorage.setItem('sidebarWidth', currentWidth);
                    }
                });
            }
            
            // 1. Инициализация мок-данных папок и закладок
            const bookmarkData = {
                jobs: [

                    { name: 'Glassdoor', url: 'https://www.glassdoor.com', domain: 'glassdoor.com' },
                    { name: 'Upwork', url: 'https://www.upwork.com', domain: 'upwork.com' },

                    { name: 'Prace.cz', url: 'https://www.prace.cz', domain: 'prace.cz' },
                    { name: 'LinkedIn', url: 'https://www.linkedin.com', domain: 'linkedin.com' }
                ],
                tools: [
                    { name: 'Figma — Инструмент дизайна', url: 'https://www.figma.com', domain: 'figma.com' },
                    { name: 'GitHub — Хранилище кода', url: 'https://github.com', domain: 'github.com' },
                    { name: 'Notion — База знаний', url: 'https://www.notion.so', domain: 'notion.so' },
                    { name: 'ChatGPT — Помощник ИИ', url: 'https://chat.openai.com', domain: 'openai.com' },
                    { name: 'Unsplash — Бесплатные фото', url: 'https://unsplash.com', domain: 'unsplash.com' }
                ],
                motion: [
                    { name: 'LottieFiles — Анимации для веб', url: 'https://lottiefiles.com', domain: 'lottiefiles.com' },
                    { name: 'After Effects Templates', url: 'https://mixkit.co', domain: 'mixkit.co' },
                    { name: 'Motionographer', url: 'https://motionographer.com', domain: 'motionographer.com' },
                    { name: 'Behance Motion Graphics', url: 'https://www.behance.net', domain: 'behance.net' }
                ],
                vacancies: [
                    { name: 'React Developer — Remote', url: 'https://remoteok.com', domain: 'remoteok.com' },
                    { name: 'UX Designer — Prague', url: 'https://www.jobs.cz', domain: 'jobs.cz' }
                ],
                youtube: [
                    { name: 'Rematrin Channel', url: 'https://www.youtube.com', domain: 'youtube.com' },
                    { name: 'Lo-Fi Beats to study/relax', url: 'https://www.youtube.com/watch?v=5qap5aO4i9A', domain: 'youtube.com' }
                ],
                later: [
                    { name: 'CSS Grid Guide — CSS Tricks', url: 'https://css-tricks.com/snippets/css/complete-guide-grid/', domain: 'css-tricks.com' },
                    { name: 'Modern Architecture Patterns in JS', url: 'https://medium.com', domain: 'medium.com' },
                    { name: 'Habr — Как войти в IT в 2026', url: 'https://habr.com', domain: 'habr.com' }
                ],
                all: [], // Будет наполнено автоматически всеми элементами
                unsorted: [],
                trash: [
                    { name: 'Старый макет дизайна', url: 'https://figma.com/old', domain: 'figma.com' },
                    { name: 'Устаревшие требования', url: 'https://notion.so/old', domain: 'notion.so' }
                ]
            };

            // Сбор всех закладок в категорию "Все закладки"
            const allKeys = ['jobs', 'tools', 'motion', 'vacancies', 'youtube', 'later'];
            allKeys.forEach(key => {
                bookmarkData.all.push(...bookmarkData[key]);
            });

            // Обновление счетчиков на боковой панели
            document.getElementById('count-all').innerText = bookmarkData.all.length;
            document.getElementById('count-later').innerText = bookmarkData.later.length;
            document.getElementById('count-trash').innerText = bookmarkData.trash.length;

            let currentFolder = 'jobs';

            // 2. Функция рендеринга списка закладок
            function renderBookmarks(folderKey, filterText = '') {
                const container = document.getElementById('bookmarksContainer');
                container.innerHTML = '';

                let items = bookmarkData[folderKey] || [];
                
                // Фильтр по поиску
                if (filterText) {
                    const query = filterText.toLowerCase();
                    items = items.filter(item => 
                        item.name.toLowerCase().includes(query) || 
                        item.url.toLowerCase().includes(query)
                    );
                }

                if (items.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; margin-top: 60px; color: var(--text-secondary);">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.4; margin-bottom: 12px;">

                                <line x1="15" y1="9" x2="9" y2="15"></line>
                                <line x1="9" y1="9" x2="15" y2="15"></line>
                            </svg>
                            <p style="font-weight: 500;">Нет закладок в этой папке</p>
                        </div>
                    `;
                    return;
                }

                items.forEach((item, index) => {
                    const row = document.createElement('div');
                    row.className = 'bookmark-row';
                    
                    // Favicon от Google S2 API
                    const faviconUrl = `https://www.google.com/s2/favicons?domain=${item.domain}&sz=64`;
                    
                    row.innerHTML = `
                        <div class="bookmark-left" onclick="window.open('${item.url}', '_blank')">
                            <div class="favicon-wrapper">
                                <img src="${faviconUrl}" class="favicon-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                <span class="favicon-fallback" style="display:none;">${item.name[0]}</span>
                            </div>
                            <div class="bookmark-info">
                                <h3 class="bookmark-title">${item.name}</h3>
                                <span class="bookmark-url">${item.url}</span>
                            </div>
                        </div>
                        <div class="bookmark-actions">
                            <button class="btn-action-round" title="Перейти на сайт" onclick="window.open('${item.url}', '_blank')">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                    <polyline points="15 3 21 3 21 9"></polyline>
                                    <line x1="10" y1="14" x2="21" y2="3"></line>
                                </svg>
                            </button>
                            <button class="btn-action-round" title="Редактировать">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                            <button class="btn-action-round" title="В корзину" style="color: #ff5e62;">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                </svg>
                            </button>
                        </div>
                    `;
                    container.appendChild(row);
                });

                // Добавление итогового счетчика в самый низ списка
                const footer = document.createElement('div');
                footer.className = 'bookmarks-footer';
                footer.innerText = `${items.length} ${getNoun(items.length, 'закладка', 'закладки', 'закладок')}`;
                container.appendChild(footer);
            }

            // Вспомогательная функция для склонения числительных на русском
            function getNoun(number, one, two, five) {
                let n = Math.abs(number);
                n %= 100;
                if (n >= 5 && n <= 20) return five;
                n %= 10;
                if (n === 1) return one;
                if (n >= 2 && n <= 4) return two;
                return five;
            }

            // 3. Привязка кликов по папкам в Sidebar
            const folderItems = document.querySelectorAll('.sidebar [data-folder]');
            folderItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    // Сброс выделения у всех папок
                    folderItems.forEach(i => i.classList.remove('highlighted', 'active'));
                    
                    // Выделение нажатой папки
                    item.classList.add('highlighted');
                    
                    currentFolder = item.getAttribute('data-folder');
                    
                    // Обновление заголовка папки в контенте
                    const folderName = item.querySelector('span:not(.menu-icon)').innerText;
                    document.getElementById('currentFolderTitle').innerText = folderName;
                    
                    // Сброс поля поиска при смене папки
                    document.getElementById('bookmarkSearch').value = '';
                    
                    // Закрытие мобильного меню при клике на папку
                    closeMobileMenu();

                    // Рендеринг закладок этой папки
                    renderBookmarks(currentFolder);
                });
            });

            // 4. Поиск по закладкам в реальном времени
            const searchInput = document.getElementById('bookmarkSearch');
            searchInput.addEventListener('input', (e) => {
                renderBookmarks(currentFolder, e.target.value);
            });

            // 5. Мобильное управление (боковая панель)
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const overlay = document.getElementById('sidebarOverlay');

            function openMobileMenu() {
                sidebar.classList.add('mobile-open');
                overlay.classList.add('active');
            }

            function closeMobileMenu() {
                sidebar.classList.remove('mobile-open');
                overlay.classList.remove('active');
            }

            mobileMenuBtn.addEventListener('click', openMobileMenu);
            overlay.addEventListener('click', closeMobileMenu);

            // Инициализация первого рендера
            renderBookmarks('jobs');
        });
    </script>
</body>

</html>
