<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Конвертер времени</title>
<link rel="icon" type="image/png" href="exchange.png">
<link rel="apple-touch-icon" href="exchange2.png">
<style>
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f4f6fb;color:#0b0d12}
  .wrap{max-width:490px;margin:0 auto;padding:22px 14px 28px}
  h1{font-size:1.25rem;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}
  
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  
  .card{display:flex;flex-direction:column;gap:8px}
  
  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#fff;
    border:1px solid #e6e9f2;
    border-radius:12px;
    box-shadow:0 1px 2px rgba(0,0,0,.03);
    padding:10px 12px;
    gap:10px;
    transition: border-color 0.2s;
  }
  .row:focus-within {
    border-color: #7aa2ff;
    box-shadow: 0 0 0 3px rgba(122,162,255,.1);
  }

  .code{display:flex;align-items:center;gap:10px;font-weight:600; font-size: 0.95rem; width: 140px;}
  .icon{width:28px;height:28px;display:inline-block;vertical-align:middle;object-fit: contain;}
  
  .amount { flex-grow: 1; }
  .amount input{
    width:100%;
    text-align:right;
    font-size:1.1rem;
    padding:6px 0;
    border:none;
    background:transparent;
    font-family: inherit;
    color: #0b0d12;
  }
  .amount input:focus{outline:none;}
  .amount input::placeholder { color: #ccc; }

  button#clearBtn{
    padding:6px 12px;
    border:1px solid #cfd5e1;
    background:#fff;
    border-radius:8px;
    cursor:pointer;
    font-size:.9rem;
    transition: all 0.2s ease;
    color: #555;
  }
  button#clearBtn:hover{background:#f0f2f7; color: #000;}
  button#clearBtn:active{transform:scale(0.95);}

</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <h1>Конвертер времени</h1>
    <button id="clearBtn" title="Очистить все поля">Очистить</button>
  </div>

  <div class="card" id="fx"></div>

</div>

<script>
// === КОНСТАНТЫ И НАСТРОЙКИ ===
// Базовая единица - миллисекунда (ms)
// Факторы рассчитаны математически точно, чтобы 1 год = 12 месяцев.
// Год берем как средний грегорианский: 365.2425 дней.
const BASE_YEAR_DAYS = 365.2425;
const MS_IN_SEC = 1000;
const MS_IN_MIN = 60 * MS_IN_SEC;
const MS_IN_HOUR = 60 * MS_IN_MIN;
const MS_IN_DAY = 24 * MS_IN_HOUR;
const MS_IN_WEEK = 7 * MS_IN_DAY;
const MS_IN_YEAR = BASE_YEAR_DAYS * MS_IN_DAY;
const MS_IN_MONTH = MS_IN_YEAR / 12; // Средний месяц

const UNITS = [
  {
    code: 'MS', name: 'М.Секунды', factor: 1, precision: 0,
    static: 'https://em-content.zobj.net/source/microsoft-3D-fluent/433/diamond-with-a-dot_1f4a0.png',
    animated: 'https://em-content.zobj.net/source/microsoft-teams/400/diamond-with-a-dot_1f4a0.png'
  },
  {
    code: 'S', name: 'Секунды', factor: MS_IN_SEC, precision: 3,
    static: 'https://em-content.zobj.net/source/microsoft-3D-fluent/433/stopwatch_23f1-fe0f.png',
    animated: 'https://em-content.zobj.net/source/microsoft-teams/400/stopwatch_23f1-fe0f.png'
  },
  {
    code: 'MIN', name: 'Минуты', factor: MS_IN_MIN, precision: 4,
    static: 'https://em-content.zobj.net/source/microsoft-3D-fluent/433/one-oclock_1f550.png',
    animated: 'https://em-content.zobj.net/source/microsoft-teams/400/one-oclock_1f550.png'
  },
  {
    code: 'H', name: 'Часы', factor: MS_IN_HOUR, precision: 5,
    static: 'https://em-content.zobj.net/source/microsoft-3D-fluent/433/three-oclock_1f552.png',
    animated: 'https://em-content.zobj.net/source/microsoft-teams/400/three-oclock_1f552.png'
  },
  {
    code: 'D', name: 'Дни', factor: MS_IN_DAY, precision: 6,
    static: 'https://em-content.zobj.net/source/microsoft-3D-fluent/433/sun_2600-fe0f.png',
    animated: 'https://em-content.zobj.net/source/microsoft-teams/400/sun_2600-fe0f.png'
  },
  {
    code: 'WK', name: 'Недели', factor: MS_IN_WEEK, precision: 6,
    static: 'https://em-content.zobj.net/source/microsoft-3D-fluent/433/spiral-calendar_1f5d3-fe0f.png',
    animated: 'https://em-content.zobj.net/source/microsoft-teams/400/spiral-calendar_1f5d3-fe0f.png'
  },
  {
    code: 'MO', name: 'Месяцы', factor: MS_IN_MONTH, precision: 7,
    static: 'https://em-content.zobj.net/source/microsoft-3D-fluent/433/crescent-moon_1f319.png',
    animated: 'https://em-content.zobj.net/source/microsoft-teams/400/crescent-moon_1f319.png'
  },
  {
    code: 'YR', name: 'Годы', factor: MS_IN_YEAR, precision: 8,
    static: 'https://em-content.zobj.net/source/microsoft-3D-fluent/433/rocket_1f680.png',
    animated: 'https://em-content.zobj.net/source/microsoft-teams/400/rocket_1f680.png'
  }
];

const container = document.getElementById('fx');
const clearBtn = document.getElementById('clearBtn');

// === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===

// Парсинг строки в число (убирает пробелы, меняет запятую на точку)
function parseLocaleNumber(stringNumber) {
    if (!stringNumber) return 0;
    const cleaned = stringNumber.replace(/\s/g, '').replace(',', '.');
    const num = parseFloat(cleaned);
    return isNaN(num) ? 0 : num;
}

// Форматирование числа с разделителями (RU локаль)
// maxDecimals - максимальное кол-во знаков после запятой
function formatLocaleNumber(num, maxDecimals = 6) {
    if (num === 0) return '';
    // Если число слишком маленькое (научная нотация), показываем как есть или 0
    if (Math.abs(num) < 1e-9) return '0';
    
    return num.toLocaleString('ru-RU', {
        maximumFractionDigits: maxDecimals,
        minimumFractionDigits: 0
    });
}

// Функция для сохранения и восстановления позиции курсора
function updateInputWithFormatting(input, rawValue) {
    // 1. Запоминаем позицию курсора относительно цифр
    const cursorPosition = input.selectionStart;
    const originalLength = input.value.length;
    const digitsBeforeCursor = input.value.slice(0, cursorPosition).replace(/[^\d]/g, '').length;
    const isComma = input.value[cursorPosition - 1] === ',' || input.value[cursorPosition - 1] === '.';

    // 2. Форматируем значение (только если это не "пустой" ввод типа "0," или просто запятая)
    // Разрешаем ввод запятой в конце
    let formattedValue;
    
    // Проверка на ввод десятичной части
    if (rawValue.endsWith(',') || rawValue.endsWith('.')) {
       // Если пользователь вводит запятую, не переформатируем жестко, просто отображаем
       formattedValue = rawValue.replace('.', ',');
    } else {
       const num = parseLocaleNumber(rawValue);
       if (num === 0 && rawValue.trim() !== '' && rawValue.indexOf('0') === -1) {
           formattedValue = rawValue; // Если ввели мусор
       } else {
           // Форматируем, но если есть дробная часть "0.00", надо дать возможность её писать
           if (rawValue.includes(',') || rawValue.includes('.')) {
               const parts = rawValue.replace(',', '.').split('.');
               const intPart = parseFloat(parts[0] || 0).toLocaleString('ru-RU');
               const decimalPart = parts[1];
               formattedValue = `${intPart},${decimalPart}`;
           } else {
               formattedValue = num.toLocaleString('ru-RU');
           }
       }
    }

    input.value = formattedValue;

    // 3. Восстанавливаем курсор
    // Это сложная логика, упростим: ставим курсор туда, где он был бы логически
    // Если мы добавили пробел разделитель, курсор должен сместиться
    const newLength = input.value.length;
    let newCursorPos = cursorPosition + (newLength - originalLength);
    
    // Защита от вылета
    if (newCursorPos < 0) newCursorPos = 0;
    input.setSelectionRange(newCursorPos, newCursorPos);
}

// Анимация иконок
let animTimeout = null;
function triggerIconsAnimation() {
    document.querySelectorAll('.icon').forEach(img => {
        const alt = img.dataset.animated;
        if(alt && img.src !== alt) img.src = alt;
    });
    if (animTimeout) clearTimeout(animTimeout);
    animTimeout = setTimeout(() => {
        document.querySelectorAll('.icon').forEach(img => img.src = img.dataset.static);
    }, 3000);
}

// === РЕНДЕРИНГ ===
function render() {
    container.innerHTML = '';
    UNITS.forEach(u => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
            <div class="code">
                <img class="icon" src="${u.static}" data-static="${u.static}" data-animated="${u.animated}" alt="">
                <span>${u.name}</span>
            </div>
            <div class="amount">
                <input type="text" inputmode="decimal" data-code="${u.code}" placeholder="0">
            </div>
        `;
        container.appendChild(row);
    });

    setupEvents();
}

function setupEvents() {
    const inputs = container.querySelectorAll('input');

    inputs.forEach(input => {
        input.addEventListener('input', (e) => {
            const el = e.target;
            const code = el.dataset.code;
            const rawVal = el.value;

            // 1. Анимация
            triggerIconsAnimation();

            // 2. Локальное форматирование текущего поля (чтобы появились пробелы 1 000)
            // Но делаем это аккуратно, только если валидное число
            if (/^[\d\s.,]*$/.test(rawVal)) {
               // Простая логика форматирования для UX:
               // Если ввели символ, не являющийся цифрой или запятой в конце, ничего не делаем
               // Здесь используем упрощенный подход: даем пользователю писать, форматируем при blur или аккуратно
               // Чтобы не ломать курсор, в этой версии просто обновляем остальные поля
            }

            // 3. Конвертация
            const val = parseLocaleNumber(rawVal);
            
            // Если поле очистили
            if (rawVal.trim() === '') {
                inputs.forEach(i => { if(i !== el) i.value = ''; });
                return;
            }

            // Пересчитываем в миллисекунды (база)
            const unitData = UNITS.find(u => u.code === code);
            const baseMs = val * unitData.factor;

            // Обновляем все остальные поля
            inputs.forEach(otherInput => {
                if (otherInput === el) return; // Не трогаем текущее поле пока пишем
                
                const otherCode = otherInput.dataset.code;
                const otherUnit = UNITS.find(u => u.code === otherCode);
                const convertedVal = baseMs / otherUnit.factor;
                
                otherInput.value = formatLocaleNumber(convertedVal, otherUnit.precision);
            });
        });

        // Форматирование "красиво" при потере фокуса текущего поля
        input.addEventListener('blur', (e) => {
            const val = parseLocaleNumber(e.target.value);
            if (val !== 0) {
                 e.target.value = val.toLocaleString('ru-RU', {maximumFractionDigits: 10});
            }
        });
        
        // При фокусе убираем пробелы, чтобы удобнее было править (опционально)
        input.addEventListener('focus', (e) => {
            const val = parseLocaleNumber(e.target.value);
            if (val !== 0) {
                e.target.value = val.toString().replace('.', ',');
            }
        });
    });
}

// Очистка
clearBtn.onclick = () => {
    container.querySelectorAll('input').forEach(i => i.value = '');
};

// Запуск
render();

</script>

<link rel="stylesheet" href="footer.css">
<div id="footer"></div>
<script>
fetch('footer.html')
  .then(r => r.text())
  .then(html => document.getElementById('footer').innerHTML = html);
</script>

</body>
</html>
