<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <style>
        html, body {
            background: transparent !important;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Все закладки</title>
    <link rel="icon" href="cloud.png">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="auth-widget.css">
    <link rel="stylesheet" href="bookmarks.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="theme-loader.js"></script>
    <script>
        if (window.location.search.includes('embedded=true')) {
            document.documentElement.classList.add('embedded');
            document.addEventListener('DOMContentLoaded', () => {
                document.body.classList.add('embedded');
            });
        }
    </script>
</head>

<body>

    <!-- Основной интерфейс закладок -->
    <div class="bookmark-app">

        <!-- Затемнение для мобильного меню -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Боковая панель (Sidebar) -->
        <aside class="sidebar" id="appSidebar">
            <!-- Ресайзер боковой панели -->
            <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>

            <!-- Шапка боковой панели -->
            <div class="sidebar-header">
                <div class="workspace-selector" id="workspaceProfileTrigger" title="Профиль пользователя">
                    <div class="workspace-avatar" id="user-avatar-display">R</div>
                    <span class="workspace-name">
                        <span id="user-name-display">rematrin</span>
                        <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor"
                            stroke-width="1.5" stroke-linecap="round">
                            <path d="M1 1L5 5L9 1" />
                        </svg>
                    </span>
                </div>
            </div>

            <!-- Меню навигации и папок -->
            <div class="sidebar-menu">

                <!-- Основные системные разделы -->
                <a href="#" class="menu-item highlighted" data-folder="all">
                    <div class="menu-item-left">
                        <span class="menu-icon">
                            <!-- Облако / Все закладки -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
                            </svg>
                        </span>
                        <span>Все закладки</span>
                    </div>
                    <span class="menu-count" id="count-all">0</span>
                </a>
                <a href="#" class="menu-item" data-folder="trash">
                    <div class="menu-item-left">
                        <span class="menu-icon">
                            <!-- Корзина -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path
                                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                                </path>
                            </svg>
                        </span>
                        <span>Корзина</span>
                    </div>
                    <span class="menu-count" id="count-trash">0</span>
                </a>

                <!-- Секция Коллекции (динамическая) -->
                <div class="menu-section-header">
                    <div class="menu-section-title">Коллекции</div>
                    <button class="btn-section-add" title="Создать коллекцию" id="create-collection-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>

                <div class="nested-folders" id="custom-collections-container"></div>
            </div>
        </aside>

        <main class="main-content">
            <!-- Единая шапка контента (Поиск, Добавить, Действия) -->
            <div class="content-header" id="normal-title-row">
                <!-- Скрытый заголовок для совместимости с JS -->
                <span id="currentFolderTitle" style="display: none;">Все закладки</span>

                <div class="header-left">
                    <button class="mobile-menu-toggle" id="mobileMenuBtn" title="Открыть меню">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>

                    <div class="search-container">
                        <span class="search-icon-left">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" class="search-input" id="bookmarkSearch" placeholder="Поиск">
                    </div>
                </div>

                <div class="view-controls" style="position: relative;">
                    <button class="btn-add-primary" id="addBookmarkBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>Добавить</span>
                    </button>
                    <button class="btn-action-round" title="Еще действия" id="main-more-actions-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="19" cy="12" r="1"></circle>
                            <circle cx="5" cy="12" r="1"></circle>
                        </svg>
                    </button>

                    <!-- Popover добавления -->
                    <div class="add-popover" id="addBookmarkPopover">
                        <div class="popover-field">
                            <label>Название</label>
                            <input type="text" id="popoverBookmarkTitle" class="popover-input"
                                placeholder="Название закладки">
                        </div>
                        <div class="popover-field">
                            <label>URL</label>
                            <input type="text" id="popoverBookmarkUrl" class="popover-input" placeholder="https://">
                        </div>
                        <div class="popover-actions">
                            <button class="btn-secondary" id="popoverCancelBtn">Отмена</button>
                            <button class="btn-add-primary" id="popoverSubmitBtn">Отправить</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Режим массового выбора (Selection mode) -->
            <div class="title-row" id="selection-title-row"
                style="display: none; background: var(--list-hover-bg-light); align-items: center; justify-content: space-between;">
                <div style="display:flex; align-items:center; gap: 12px;">
                    <input type="checkbox" id="selectAllCheckbox" style="width: 16px; height: 16px; cursor: pointer;">
                    <strong id="selectionCountText" style="font-size: 14px;">0 выбрано</strong>
                </div>
                <div style="display:flex; align-items:center; gap: 8px;">
                    <button class="btn-secondary" id="massMoveBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                            </path>
                        </svg>
                        Переместить
                    </button>
                    <button class="btn-secondary" id="massDeleteBtn"
                        style="color: #dc3545; border-color: rgba(220, 53, 69, 0.3);">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                        </svg>
                        Удалить
                    </button>

                </div>
                <button class="btn-secondary" id="cancelSelectionBtn" style="border: none;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                    Отмена
                </button>
            </div>

            <!-- Информационный баннер корзины (по умолчанию скрыт) -->
            <div id="trash-banner"
                style="display: none; padding: 12px 24px; background: rgba(220, 53, 69, 0.05); border-bottom: 1px solid var(--border); font-size: 13px; justify-content: space-between; align-items: center;">
                <span style="color: var(--text-secondary);">Объекты в корзине хранятся 30 дней — потом удаляются
                    навсегда.</span>
                <a href="#" id="empty-trash-link"
                    style="color: #dc3545; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 4px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                        </path>
                    </svg>
                    Очистить корзину
                </a>
            </div>

            <!-- Список закладок -->
            <div class="bookmarks-list-container" id="bookmarksContainer">
                <div style="text-align: center; margin-top: 60px; color: var(--text-secondary);">
                    <p>Пожалуйста, авторизуйтесь для просмотра ваших закладок.</p>
                </div>
            </div>

        </main>

        <aside class="edit-panel" id="editPanel">
            <div class="edit-panel-header">
                <button class="btn-action-round" id="closeEditPanelBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div class="edit-panel-content">
                <div class="edit-field-row">
                    <label class="edit-field-label">Название</label>
                    <div class="edit-field-value">
                        <input type="text" id="editTitleInput" class="edit-url-input" placeholder="Название закладки"
                            autocomplete="off" spellcheck="false">
                    </div>
                </div>

                <div class="edit-field-row">
                    <label class="edit-field-label">Иконка</label>
                    <div class="edit-field-value" style="display: flex; align-items: center; gap: 12px;">
                        <div class="edit-favicon" style="width: 32px; height: 32px; border-radius: 6px;">
                            <img id="editFavicon" src="" alt="">
                        </div>
                        <span id="editChangeIconBtn" class="edit-change-icon-btn">Изменить</span>
                        <input type="file" id="editIconFileInput" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="edit-field-row">
                    <label class="edit-field-label">Коллекция</label>
                    <div class="edit-field-value">
                        <button id="editCollectionBtn" class="collection-select-btn">
                            <span id="editCollectionName">Все закладки</span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="edit-field-row">
                    <label class="edit-field-label">URL</label>
                    <div class="edit-field-value">
                        <textarea id="editUrlInput" class="edit-url-input" autocomplete="off" spellcheck="false"
                            rows="1"></textarea>
                    </div>
                </div>

                <div class="edit-field-row" style="margin-top: 8px;">
                    <label class="edit-field-label"></label>
                    <div class="edit-field-value">
                        <button id="editDeleteBtn" class="edit-delete-btn">Удалить</button>
                    </div>
                </div>

                <div style="flex: 1;"></div>
            </div>
        </aside>

    </div>

    <!-- Скрипты -->
    <script type="module" src="nav-widget.js"></script>
    <script type="module" src="auth-widget.js"></script>
    <!-- header.js удалён так как используется другой макет интерфейса -->
    <script type="module" src="bookmarks.js"></script>

</body>

</html>
