<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Закладки</title>
    <link rel="icon" href="favicon.png">

    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="auth-widget.css">
    <link rel="stylesheet" href="bookmarks.css">

    <style>
        body { padding-top: 60px; }
    </style>
</head>

<body>

    <script src="theme-loader.js"></script>

    <div id="header-container"></div>

    <div class="wrap">
        <h1 class="section-title" style="margin-bottom:12px">Закладки</h1>

        <div id="bookmarks-app">
            <div class="card" id="bm-controls">
                <input id="bm-title" placeholder="Название" class="bm-input">
                <input id="bm-url" placeholder="https://example.com" class="bm-input">
                <button id="bm-add" class="vk-btn">Добавить</button>
                <div id="bm-hint" class="muted" style="margin-top:8px">Войдите, чтобы сохранять закладки в облако.</div>
            </div>

            <div id="bm-list" style="margin-top:18px"></div>
        </div>
    </div>

    <script type="module" src="nav-widget.js"></script>
    <script type="module" src="auth-widget.js"></script>
    <script type="module" src="header.js"></script>
    <script type="module" src="bookmarks.js"></script>

</body>

</html>
