<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Закладки — Rematrin</title>
    <link rel="icon" href="favicon.png">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="auth-widget.css">
    <link rel="stylesheet" href="bookmarks.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="theme-loader.js"></script>
</head>

<body>

    <!-- Основной интерфейс закладок -->
    <div class="bookmark-app">
        
        <!-- Затемнение для мобильного меню -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Боковая панель (Sidebar) -->
        <aside class="sidebar" id="appSidebar">
            <!-- Ресайзер боковой панели -->
            <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
            
            <!-- Шапка боковой панели -->
            <div class="sidebar-header">
                <div class="workspace-selector" id="workspaceProfileTrigger" title="Профиль пользователя">
                    <div class="workspace-avatar" id="user-avatar-display">R</div>
                    <span class="workspace-name">
                        <span id="user-name-display">rematrin</span>
                        <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                            <path d="M1 1L5 5L9 1" />
                        </svg>
                    </span>
                </div>
            </div>

            <!-- Меню навигации и папок -->
            <div class="sidebar-menu">
                
                <!-- Основные системные разделы -->
                <a href="#" class="menu-item highlighted" data-folder="all">
                    <div class="menu-item-left">
                        <span class="menu-icon">
                            <!-- Облако / Все закладки -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
                            </svg>
                        </span>
                        <span>Все закладки</span>
                    </div>
                    <span class="menu-count" id="count-all">0</span>
                <a href="#" class="menu-item" data-folder="trash">
                    <div class="menu-item-left">
                        <span class="menu-icon">
                            <!-- Корзина -->
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </span>
                        <span>Корзина</span>
                    </div>
                    <span class="menu-count" id="count-trash">0</span>
                </a>

                <!-- Секция Коллекции (динамическая) -->
                <div class="menu-section-header">
                    <div class="menu-section-title">Коллекции</div>
                    <button class="btn-section-add" title="Создать коллекцию" id="create-collection-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>

                <div class="nested-folders" id="custom-collections-container">
                    <!-- Сюда будут рендериться папки через JS -->
                </div>
            </div>

        </aside>

        <!-- Основная область с закладками -->
        <main class="main-content">
            
            <!-- Шапка контента (Поиск, Добавить, Действия) -->
            <div class="content-header">
                
                <!-- Полноценный поиск -->
                <div style="display: flex; align-items: center;">
                    <button class="mobile-menu-toggle" id="mobileMenuBtn" title="Открыть меню">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <div class="search-container">
                        <span class="search-icon-left">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                        <input type="text" class="search-input" id="bookmarkSearch" placeholder="Поиск">
                    </div>
                </div>

                <!-- Кнопки управления в шапке -->
                <div class="header-actions">
                    <button class="btn-add-primary" id="addBookmarkBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>Добавить</span>
                    </button>
                </div>

            </div>

            <!-- Подзаголовок (Выбранная папка и Действия экспорта/вида) -->
            <div class="title-row">
                <div class="folder-title-box">
                    <span class="folder-large-icon">
                        <!-- Иконка открытой папки -->
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </span>
                    <h1 class="folder-large-title" id="currentFolderTitle">Все закладки</h1>
                </div>

                <!-- Настройки отображения -->
                <div class="view-controls">
                    <button class="btn-secondary" title="Режим отображения">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="9" y1="21" x2="9" y2="9"></line>
                        </svg>
                        <span>Заголовки</span>
                    </button>
                    <button class="btn-action-round" title="Еще действия" id="main-more-actions-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="19" cy="12" r="1"></circle>
                            <circle cx="5" cy="12" r="1"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Информационный баннер корзины (по умолчанию скрыт) -->
            <div id="trash-banner" style="display: none; padding: 12px 24px; background: rgba(220, 53, 69, 0.05); border-bottom: 1px solid var(--border); font-size: 13px; justify-content: space-between; align-items: center;">
                <span style="color: var(--text-secondary);">Объекты в корзине хранятся 30 дней — потом удаляются навсегда.</span>
                <a href="#" id="empty-trash-link" style="color: #dc3545; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 4px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Очистить корзину
                </a>
            </div>

            <!-- Список закладок -->
            <div class="bookmarks-list-container" id="bookmarksContainer">
                <div style="text-align: center; margin-top: 60px; color: var(--text-secondary);">
                    <p>Пожалуйста, авторизуйтесь для просмотра ваших закладок.</p>
                </div>
            </div>

        </main>

    </div>

    <!-- Скрипты -->
    <script type="module" src="nav-widget.js"></script>
    <script type="module" src="auth-widget.js"></script>
    <!-- header.js удалён так как используется другой макет интерфейса -->
    <script type="module" src="bookmarks.js"></script>

</body>

</html>
