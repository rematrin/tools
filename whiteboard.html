<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Интерактивная доска</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS Стили -->
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="auth-widget.css">
    <link rel="stylesheet" href="whiteboard.css">
</head>
<body>

    <!-- Панель управления списком досок (Dashboard) -->
    <div id="dashboardView" class="dashboard-view" style="display: none;">
        <header class="dashboard-header-bar">
            <div class="header-left">
                <a href="index.html" class="btn-back" title="Все сервисы">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </a>
                <h2 class="dashboard-title">Мои интерактивные доски</h2>
            </div>
            <div class="header-right">
                <button id="btnCreateBoard" class="btn-primary-action" style="margin-right: 16px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px; vertical-align: middle;">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Создать доску
                </button>
                <div id="header-container"></div>
            </div>
        </header>
        <div class="dashboard-content">
            <div class="boards-grid" id="boardsGrid">
                <!-- Карточки досок будут генерироваться динамически -->
            </div>
        </div>
    </div>

    <!-- Интерфейс конкретной доски (показывается при наличии ?id= в URL) -->
    <div id="boardActiveView" class="board-app-view" style="display: none;">
        <!-- Предупреждение для мобильных устройств -->
        <div id="mobileReadOnlyBanner" class="mobile-readonly-banner" style="display: none;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px; flex-shrink: 0;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span>Режим просмотра. Редактирование доски доступно только с компьютера.</span>
        </div>

        <!-- Шапка приложения -->
        <header class="board-header">
        <div class="header-left">
            <a href="whiteboard.html" class="btn-back" title="Назад к списку досок">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <input type="text" id="boardTitleInput" value="Моя доска идей" class="board-title-input" title="Название доски">
            <span id="saveStatus" class="save-status">Сохранено</span>
        </div>

        <div class="header-center">
            <div class="zoom-controls">
                <button id="btnZoomOut" class="btn-zoom" title="Отдалить">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <span id="zoomPercent" class="zoom-percent">100%</span>
                <button id="btnZoomIn" class="btn-zoom" title="Приблизить">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <button id="btnZoomReset" class="btn-zoom-reset" title="Сбросить масштаб">Сбросить</button>
            </div>
        </div>

        <div class="header-right">
            <div class="board-actions">
                <button id="btnToggleGrid" class="btn-action active" title="Сетка">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="3" x2="9" y2="21"></line>
                        <line x1="15" y1="3" x2="15" y2="21"></line>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="3" y1="15" x2="21" y2="15"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Основное рабочее пространство -->
    <main class="board-container" id="boardViewport">
        <!-- Холст, который можно двигать и масштабировать -->
        <div class="board-canvas-holder" id="canvasHolder">
            <div class="board-canvas" id="boardCanvas">
                
                <!-- Ресайзеры границ холста -->
                <div class="canvas-resize-handle edge-top" data-edge="top"></div>
                <div class="canvas-resize-handle edge-right" data-edge="right"></div>
                <div class="canvas-resize-handle edge-bottom" data-edge="bottom"></div>
                <div class="canvas-resize-handle edge-left" data-edge="left"></div>

                <!-- Контейнер для SVG путей (рисование) -->
                <svg class="drawing-layer" id="drawingLayer"></svg>

                <!-- Контейнер для интерактивных элементов -->
                <div class="elements-layer" id="elementsLayer"></div>
            </div>
        </div>
    </main>

    <!-- Боковая панель инструментов -->
    <aside class="board-toolbar">
        <button class="tool-btn active" id="toolSelect" title="Выбор и перемещение">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 12 13 17 21 14 22 9 14 5 17 5 3"></polygon>
            </svg>
        </button>
        
        <div class="toolbar-divider"></div>

        <button class="tool-btn" id="toolText" title="Текстовый блок">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 7 4 4 20 4 20 7"></polyline>
                <line x1="9" y1="20" x2="15" y2="20"></line>
                <line x1="12" y1="4" x2="12" y2="20"></line>
            </svg>
        </button>

        <button class="tool-btn" id="toolSticker" title="Стикер">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
        </button>

        <button class="tool-btn" id="toolFrame" title="Рамка-группа">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                <path d="M9 3v18M15 3v18M3 9h18M3 15h18"></path>
            </svg>
        </button>

        <button class="tool-btn" id="toolLink" title="Ссылка">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
            </svg>
        </button>

        <button class="tool-btn" id="toolImage" title="Изображение">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
        </button>

        <button class="tool-btn" id="toolDraw" title="Карандаш">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
        </button>

        <button class="tool-btn" id="toolEraser" title="Ластик">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 20H7L3 16C2 15 2 13 3 12L13 2C14 1 16 1 17 2L21 6C22 7 22 9 21 10L12 19L20 20Z"></path>
                <line x1="17" y1="17" x2="17" y2="17"></line>
            </svg>
        </button>

        <div class="toolbar-divider"></div>

        <button class="tool-btn" id="btnUndo" title="Шаг назад (Ctrl+Z)" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 7v6h6"></path>
                <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
            </svg>
        </button>

        <button class="tool-btn" id="btnRedo" title="Шаг вперед (Ctrl+Y)" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 7v6h-6"></path>
                <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path>
            </svg>
        </button>
    </aside>

    <!-- Выбор цвета для карандаша / стикеров (всплывающий тулбар при активации) -->
    <div class="color-picker-panel" id="colorPickerPanel">
        <div class="color-option active" style="background-color: #111827;" data-color="#111827"></div>
        <div class="color-option" style="background-color: #3b82f6;" data-color="#3b82f6"></div>
        <div class="color-option" style="background-color: #ef4444;" data-color="#ef4444"></div>
        <div class="color-option" style="background-color: #10b981;" data-color="#10b981"></div>
        <div class="color-option" style="background-color: #f59e0b;" data-color="#f59e0b"></div>
        <div class="color-option" style="background-color: #8b5cf6;" data-color="#8b5cf6"></div>
        <div class="color-option" style="background-color: #ec4899;" data-color="#ec4899"></div>
    </div>

    <!-- Инпут для добавления ссылок -->
    <div class="url-input-modal" id="urlInputModal">
        <div class="url-modal-content">
            <h3>Вставьте ссылку</h3>
            <input type="url" id="bookmarkUrlInput" placeholder="https://example.com" class="modal-input">
            <div class="modal-buttons">
                <button class="btn-modal-cancel" id="btnUrlCancel">Отмена</button>
                <button class="btn-modal-confirm" id="btnUrlConfirm">Добавить</button>
            </div>
        </div>
    </div>

    <!-- Скрытый инпут загрузки картинок -->
    <input type="file" id="imageFileInput" accept="image/*" style="display: none;">

    <!-- Панель режима режима рисования (Milanote style) -->
    <div class="drawing-mode-panel" id="drawingModePanel">
        <div class="drawing-tools-group">
            <button class="drawing-panel-btn active" id="drawBtnPencil" title="Карандаш">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
            </button>
            <button class="drawing-panel-btn" id="drawBtnEraser" title="Ластик">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 20H7L3 16C2 15 2 13 3 12L13 2C14 1 16 1 17 2L21 6C22 7 22 9 21 10L12 19L20 20Z"></path>
                </svg>
            </button>
        </div>
        <div class="drawing-panel-divider"></div>
        <div class="drawing-colors-group">
            <div class="draw-color-opt active" style="background-color: #111827;" data-color="#111827"></div>
            <div class="draw-color-opt" style="background-color: #3b82f6;" data-color="#3b82f6"></div>
            <div class="draw-color-opt" style="background-color: #ef4444;" data-color="#ef4444"></div>
            <div class="draw-color-opt" style="background-color: #10b981;" data-color="#10b981"></div>
            <div class="draw-color-opt" style="background-color: #f59e0b;" data-color="#f59e0b"></div>
            <div class="draw-color-opt" style="background-color: #8b5cf6;" data-color="#8b5cf6"></div>
            <div class="draw-color-opt" style="background-color: #ec4899;" data-color="#ec4899"></div>
        </div>
        <div class="drawing-panel-divider"></div>
        <div class="drawing-action-buttons">
            <button class="btn-draw-discard" id="btnDrawDiscard">Отмена</button>
            <button class="btn-draw-save" id="btnDrawSave">Сохранить</button>
        </div>
    </div>

    <div class="element-options-panel" id="elementOptionsPanel" style="display: none;">
        <button class="options-panel-btn" id="btnOptColor" title="Цвет и эффекты">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 2a15.3 15.3 0 0 1 4 7 15.3 15.3 0 0 1-4 7 15.3 15.3 0 0 1-4-7 15.3 15.3 0 0 1 4-7z"></path>
            </svg>
        </button>
        <button class="options-panel-btn" id="btnOptDelete" title="Удалить" style="color: #ef4444; margin-left: 6px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        </button>

        <!-- Всплывающее меню настроек цвета, тени и скругления -->
        <div class="element-settings-popup" id="elementSettingsPopup">
            <div class="popup-section">
                <span class="popup-section-title">Fill color</span>
                <div class="popup-colors-grid">
                    <div class="popup-color-opt" style="background-color: #fca5a5;" data-color="#fca5a5" title="Красный"></div>
                    <div class="popup-color-opt" style="background-color: #fdba74;" data-color="#fdba74" title="Оранжевый"></div>
                    <div class="popup-color-opt" style="background-color: #fef08a;" data-color="#fef08a" title="Желтый"></div>
                    <div class="popup-color-opt" style="background-color: #86efac;" data-color="#86efac" title="Зеленый"></div>
                    <div class="popup-color-opt" style="background-color: #93c5fd;" data-color="#93c5fd" title="Синий"></div>
                    <div class="popup-color-opt" style="background-color: #c084fc;" data-color="#c084fc" title="Фиолетовый"></div>
                    <div class="popup-color-opt" style="background-color: #f472b6;" data-color="#f472b6" title="Розовый"></div>
                    <div class="popup-color-opt" style="background-color: #ffffff; border: 1px solid #cbd5e1;" data-color="#ffffff" title="Белый"></div>
                    <div class="popup-color-opt color-transparent" data-color="transparent" title="Прозрачный"></div>
                    <div class="popup-color-opt color-custom" id="btnCustomColorPicker" title="Кастомный">
                        <input type="color" id="optCustomColorInput" style="opacity: 0; width: 100%; height: 100%; cursor: pointer;">
                    </div>
                </div>
            </div>
            
            <div class="popup-section">
                <span class="popup-section-title">Shadow</span>
                <div class="popup-shadows-list">
                    <button class="shadow-opt-btn" data-shadow="none" title="No shadow">
                        <div class="shadow-preview sh-none"></div>
                    </button>
                    <button class="shadow-opt-btn" data-shadow="box" title="Box shadow">
                        <div class="shadow-preview sh-box"></div>
                    </button>
                    <button class="shadow-opt-btn" data-shadow="sticker" title="Sticker shadow">
                        <div class="shadow-preview sh-sticker"></div>
                    </button>
                    <button class="shadow-opt-btn" data-shadow="paper" title="Paper shadow">
                        <div class="shadow-preview sh-paper"></div>
                    </button>
                    <button class="shadow-opt-btn" data-shadow="film" title="Film shadow">
                        <div class="shadow-preview sh-film"></div>
                    </button>
                </div>
            </div>
            
            <div class="popup-section">
                <div class="popup-section-row">
                    <span class="popup-section-title">Corner Radius</span>
                    <span id="lblCornerRadiusValue" class="popup-value-label">8px</span>
                </div>
                <input type="range" id="sliderCornerRadius" min="0" max="32" value="8" class="popup-slider">
            </div>
        </div>
    </div>

    <!-- Всплывающая панель форматирования выделенного текста -->
    <div class="text-format-toolbar" id="textFormatToolbar" style="display: none;">
        <button class="format-btn" id="btnFmtType" title="Тип текста">
            <span style="font-weight: 600;">T</span>
            <span style="font-size: 7px; margin-left: 2px;">▼</span>
        </button>
        <div class="format-divider"></div>

        <button class="format-btn" id="btnFmtBold" title="Жирный"><b>B</b></button>
        <button class="format-btn" id="btnFmtItalic" title="Курсив"><i>I</i></button>
        <button class="format-btn" id="btnFmtUnderline" title="Подчеркнутый"><u>U</u></button>
        <button class="format-btn" id="btnFmtStrike" title="Зачеркнутый"><s>S</s></button>
        
        <div class="format-divider"></div>

        <!-- Выпадающий список типов текста -->
        <div class="format-type-popup" id="formatTypePopup">
            <button class="type-opt" data-command="formatBlock" data-val="div"><span class="type-icon" style="font-weight:bold;">T</span> Text</button>
            <button class="type-opt" data-command="formatBlock" data-val="h1"><span class="type-icon">H1</span> Heading 1</button>
            <button class="type-opt" data-command="formatBlock" data-val="h2"><span class="type-icon">H2</span> Heading 2</button>
            <button class="type-opt" data-command="formatBlock" data-val="h3"><span class="type-icon">H3</span> Heading 3</button>
            <button class="type-opt" data-command="formatBlock" data-val="h4"><span class="type-icon">H4</span> Heading 4</button>
            <button class="type-opt" data-command="formatBlock" data-val="h5"><span class="type-icon">H5</span> Heading 5</button>
            <button class="type-opt" data-command="formatBlock" data-val="h6"><span class="type-icon">H6</span> Heading 6</button>
            <button class="type-opt" data-command="insertUnorderedList"><span class="type-icon">•</span> Bulleted List</button>
            <button class="type-opt" data-command="insertOrderedList"><span class="type-icon">1.</span> Numbered List</button>
            <button class="type-opt" id="btnInsertTodo"><span class="type-icon">☑</span> To-do List</button>
        </div>
        
        <button class="format-btn" id="btnFmtHighlight" title="Цвет и фон">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 14.7255 3.09032 17.1962 4.85857 19C5.03457 19.176 5.09343 19.434 5.00643 19.67C4.69843 20.505 4.5 21.43 4.5 22C4.5 22 7 22 8 20.5C8.214 20.4 8.473 20.459 8.65 20.635C10.1962 21.5097 12 22 12 22Z"></path>
            </svg>
            <span style="font-size: 8px; margin-left: 2px;">▼</span>
        </button>

        <!-- Выпадающий список цветов Fore/Back -->
        <div class="format-highlight-popup" id="formatHighlightPopup">
            <div class="highlight-group-title">Color</div>
            <button class="highlight-opt" data-type="fore" data-color="inherit">Default Color</button>
            <button class="highlight-opt" data-type="fore" data-color="#ef4444" style="color: #ef4444;">Red</button>
            <button class="highlight-opt" data-type="fore" data-color="#f97316" style="color: #f97316;">Orange</button>
            <button class="highlight-opt" data-type="fore" data-color="#eab308" style="color: #eab308;">Yellow</button>
            <button class="highlight-opt" data-type="fore" data-color="#22c55e" style="color: #22c55e;">Green</button>
            <button class="highlight-opt" data-type="fore" data-color="#14b8a6" style="color: #14b8a6;">Teal</button>
            <button class="highlight-opt" data-type="fore" data-color="#3b82f6" style="color: #3b82f6;">Blue</button>
            <button class="highlight-opt" data-type="fore" data-color="#a855f7" style="color: #a855f7;">Purple</button>
            <button class="highlight-opt" data-type="fore" data-color="#6b7280" style="color: #6b7280;">Grey</button>
            
            <div class="highlight-group-title">Background</div>
            <button class="highlight-opt" data-type="back" data-color="transparent">Default Background</button>
            <button class="highlight-opt" data-type="back" data-color="#fee2e2" style="background-color: #fee2e2; color: #111827;">Red</button>
            <button class="highlight-opt" data-type="back" data-color="#ffedd5" style="background-color: #ffedd5; color: #111827;">Orange</button>
            <button class="highlight-opt" data-type="back" data-color="#fef9c3" style="background-color: #fef9c3; color: #111827;">Yellow</button>
            <button class="highlight-opt" data-type="back" data-color="#dcfce7" style="background-color: #dcfce7; color: #111827;">Green</button>
            <button class="highlight-opt" data-type="back" data-color="#ccfbf1" style="background-color: #ccfbf1; color: #111827;">Teal</button>
            <button class="highlight-opt" data-type="back" data-color="#dbeafe" style="background-color: #dbeafe; color: #111827;">Blue</button>
            <button class="highlight-opt" data-type="back" data-color="#f3e8ff" style="background-color: #f3e8ff; color: #111827;">Purple</button>
        </div>
    </div>

    <!-- Скрипты -->
    <script type="module" src="nav-widget.js"></script>
