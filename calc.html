<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Умные калькуляторы</title>

  <link rel="stylesheet" href="theme.css">
  <link rel="icon" type="image/png" href="percentage.png">

  <style>
    /* === СТИЛИ ЭТОЙ СТРАНИЦЫ === */
    :root {
      --gap: 8px;
      --pad: 12px;
    }

    .wrap {
      max-width: 630px;
      margin: 0 auto;
      padding: 0 10px;
    }

    h1 {
      font-size: 1.35rem;
      margin: 10px 0 24px;
      /* Increased bottom margin for more breathing room */
      text-align: center;
      color: var(--text);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: var(--pad);
      margin-bottom: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .calc-row {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    body.dark .calc-row {
      background: #1e1e1e;
    }

    .calc-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(98, 0, 238, 0.12);
    }

    .editor-wrapper {
      position: relative;
      flex-grow: 1;
      min-width: 0;
    }

    .calc-input {
      border: none;
      background: transparent;
      color: transparent;
      caret-color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      width: 100%;
      outline: none;
      padding: 8px 10px;
      margin: 0;
      position: relative;
      z-index: 2;
      line-height: 1.4;
      display: block;
      box-sizing: border-box;
    }

    .editor-highlight {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 1;
      pointer-events: none;
      padding: 8px 10px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      white-space: pre;
      overflow: hidden;
      margin: 0;
      box-sizing: border-box;
      line-height: 1.4;
      display: block;
    }

    /* Highlight Colors */
    .hl-num {
      color: #2A64F6;
      font-weight: 400;
    }

    .hl-kwd {
      color: #C24BB8;
      font-weight: 400;
    }

    body.dark .hl-num {
      color: #5B89FF;
    }

    body.dark .hl-kwd {
      color: #E071D7;
    }

    .calc-result {
      font-weight: 700;
      color: var(--text);
      background: #f7f7f7;
      border-left: 1px solid #e5e5e5;
      padding: 8px 12px;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
      white-space: nowrap;
      min-width: 80px;
      text-align: right;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
      max-width: 45%;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 1rem;
    }

    body.dark .calc-result {
      background: #1a1a1a;
      border-left-color: #333;
    }
  </style>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-384FKZ1NQP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-384FKZ1NQP');
  </script>
</head>

<body>

  <script src="theme-loader.js"></script>

  <div id="header-container"></div>

  <div class="wrap">
    <h1>Умные калькуляторы</h1>

    <div class="card" id="calcA">
      <div class="card-title">Сколько процентов одно число от другого</div>
      <div class="calc-row">
        <div class="editor-wrapper">
          <div class="editor-highlight" aria-hidden="true"></div>
          <input class="calc-input" type="text" value="15 это сколько % от 200" spellcheck="false">
        </div>
        <span class="calc-result">-</span>
      </div>
    </div>

    <div class="card" id="calcB">
      <div class="card-title">Вычисление процента от числа</div>
      <div class="calc-row">
        <div class="editor-wrapper">
          <div class="editor-highlight" aria-hidden="true"></div>
          <input class="calc-input" type="text" value="20% от 150" spellcheck="false">
        </div>
        <span class="calc-result">-</span>
      </div>
    </div>

    <div class="card" id="calcC">
      <div class="card-title">Плюс или минус процент</div>
      <div class="calc-row">
        <div class="editor-wrapper">
          <div class="editor-highlight" aria-hidden="true"></div>
          <input class="calc-input" type="text" value="200 + 10%" spellcheck="false">
        </div>
        <span class="calc-result">-</span>
      </div>
    </div>

    <div class="card" id="calcD">
      <div class="card-title">Калькулятор даты</div>
      <div class="calc-row">
        <div class="editor-wrapper">
          <div class="editor-highlight" aria-hidden="true"></div>
          <input class="calc-input" type="text" id="dateCalcInput" value="" spellcheck="false">
        </div>
        <span class="calc-result">-</span>
      </div>
    </div>

    <div class="card" id="calcE">
      <div class="card-title">Калькулятор времени</div>
      <div class="calc-row">
        <div class="editor-wrapper">
          <div class="editor-highlight" aria-hidden="true"></div>
          <input class="calc-input" type="text" value="12:00 + 05:00" spellcheck="false">
        </div>
        <span class="calc-result">-</span>
      </div>
    </div>

    <div class="card" id="calcF">
      <div class="card-title">Конвертер времени</div>
      <div class="calc-row">
        <div class="editor-wrapper">
          <div class="editor-highlight" aria-hidden="true"></div>
          <input class="calc-input" type="text" value="5 часов в минутах" spellcheck="false">
        </div>
        <span class="calc-result">-</span>
      </div>
    </div>

    <script>
      let exchangeRates = { USD: 1, EUR: 0.92, RUB: 90 };

      // Setup today's date for calculator D
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      document.getElementById('dateCalcInput').value = `${dd}.${mm}.${yyyy} + 2 месяца`;

      // Load real exchange rates
      fetch('https://open.er-api.com/v6/latest/USD')
        .then(res => res.json())
        .then(data => {
          if (data && data.rates) {
            exchangeRates = data.rates;
            updateAll();
          }
        })
        .catch(err => console.error("Could not fetch rates:", err));

      function cleanNumber(str) {
        return str.replace(/ /g, '').replace(',', '.');
      }

      function applyHighlights(text) {
        let s = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        // Highlight numbers and time (e.g. 15:00)
        s = s.replace(/(\b\d+(?:[\.,:]\d+)?\b)/g, '<span class="hl-num">$1</span>');

        // Highlight keywords and dynamically loaded currencies
        let curs = Object.keys(exchangeRates).join('|');
        let kwdRegex = new RegExp(`([%€\\$£₽]|\\b(?:${curs})\\b|милисек[ундах]*|миллисек[ундах]*|мсек|сек[ундах]*|недел[июьея]*|мес[яцв]*|год[а]*|лет|дн[ейя]*|день|час[ова]*|мин[утыа]*|это|сколько|от)`, 'gi');
        s = s.replace(kwdRegex, '<span class="hl-kwd">$1</span>');
        return s;
      }

      function evaluateLine(line) {
        try {
          let s = line.toLowerCase().trim();
          let isCurrencyOut = null;
          if (!s) return '';

          // Date evaluation
          let dateMatch1 = s.match(/(\d+(?:\.\d+)?)\s+(дн[a-zа-яё]*|ден[a-zа-яё]*|нед[a-zа-яё]*|мес[a-zа-яё]*|год[a-zа-яё]*|лет)\s+(после|до)\s+(завтра|вчера|сегодня)/);
          let dateMatch2 = s.match(/(?:через|спустя)\s+(\d+(?:\.\d+)?)\s+(дн[a-zа-яё]*|ден[a-zа-яё]*|нед[a-zа-яё]*|мес[a-zа-яё]*|год[a-zа-яё]*|лет)/);
          let dateMatch3 = s.match(/(\d{1,2}(?:\.\d{1,2}\.\d{4}|\s*[a-zа-яё]+(?:\s*\d{4})?))\s*([-+])\s*(\d+(?:\.\d+)?)\s+(дн[a-zа-яё]*|ден[a-zа-яё]*|нед[a-zа-яё]*|мес[a-zа-яё]*|год[a-zа-яё]*|лет)/);

          let dateMatch = dateMatch1 || dateMatch2 || dateMatch3;
          if (dateMatch) {
            let num, unitStr, dir = 1, baseOffset = 0, baseDate = new Date();
            baseDate.setHours(0, 0, 0, 0);

            if (dateMatch3) {
              let dateStr = dateMatch3[1].trim();
              dir = (dateMatch3[2] === '+') ? 1 : -1;
              num = parseFloat(cleanNumber(dateMatch3[3]));
              unitStr = dateMatch3[4];

              if (/\d{1,2}\.\d{1,2}\.\d{4}/.test(dateStr)) {
                let parts = dateStr.split('.');
                baseDate = new Date(parts[2], parseInt(parts[1], 10) - 1, parts[0]);
              } else {
                let strParts = dateStr.split(/\s+/);
                let day = parseInt(strParts[0], 10);
                let monthStr = strParts[1];
                let year = strParts[2] ? parseInt(strParts[2], 10) : baseDate.getFullYear();

                let monthsMap = {
                  'янв': 0, 'фев': 1, 'мар': 2, 'апр': 3, 'мая': 4, 'май': 4,
                  'июн': 5, 'июл': 6, 'авг': 7, 'сен': 8, 'окт': 9, 'ноя': 10, 'дек': 11
                };

                let monthIdx = 0;
                for (let m in monthsMap) {
                  if (monthStr.startsWith(m)) { monthIdx = monthsMap[m]; break; }
                }
                baseDate = new Date(year, monthIdx, day);
              }
            } else {
              num = parseFloat(cleanNumber(dateMatch[1]));
              unitStr = dateMatch[2];

              if (dateMatch1) {
                let dirStr = dateMatch1[3];
                let baseStr = dateMatch1[4];
                dir = (dirStr === 'после') ? 1 : -1;
                if (baseStr === 'завтра') baseOffset = 1;
                if (baseStr === 'вчера') baseOffset = -1;
              }
            }

            let d = new Date(baseDate.getTime());
            d.setDate(d.getDate() + baseOffset);

            if (unitStr.startsWith('мес')) {
              d.setMonth(d.getMonth() + dir * num);
            } else if (unitStr.startsWith('год') || unitStr.startsWith('лет')) {
              d.setFullYear(d.getFullYear() + dir * num);
            } else {
              let days = 0;
              if (unitStr.startsWith('дн') || unitStr.startsWith('ден')) days = num;
              else if (unitStr.startsWith('нед')) days = num * 7;
              d.setDate(d.getDate() + dir * days);
            }

            let dispMonths = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
            let resYear = d.getFullYear() !== new Date().getFullYear() ? ` ${d.getFullYear()}` : '';
            return `${d.getDate()} ${dispMonths[d.getMonth()]}${resYear}`;
          }

          // Currency exchange (e.g. 220 EUR в USD)
          s = s.replace(/([\d\.,\s]+)\s*([a-zа-я]{3})\s+в\s+([a-zа-я]{3})/gi, (m, val, c1, c2) => {
            let v = parseFloat(cleanNumber(val));
            let map = { 'eur': 'EUR', 'евр': 'EUR', 'usd': 'USD', 'дол': 'USD', 'rub': 'RUB', 'руб': 'RUB' };
            let from = map[c1.toLowerCase()] || c1.toUpperCase();
            let to = map[c2.toLowerCase()] || c2.toUpperCase();

            if (exchangeRates && exchangeRates[from] && exchangeRates[to]) {
              isCurrencyOut = to;
              return (v / exchangeRates[from] * exchangeRates[to]).toFixed(4);
            }
            return val; // fallback
          });

          // Unit Conversion (e.g. 5 часов в минутах)
          s = s.replace(/([\d\.,\s]+)\s+([a-zа-яё]+)\s+в\s+([a-zа-яё]+)/gi, (m, val, u1, u2) => {
            let v = parseFloat(cleanNumber(val));

            let timeUnits = {
              'мс': 0.001, 'мсек': 0.001, 'милисек': 0.001, 'миллисек': 0.001,
              'с': 1, 'сек': 1, 'секунд': 1,
              'м': 60, 'мин': 60, 'минут': 60,
              'ч': 3600, 'час': 3600,
              'д': 86400, 'дн': 86400, 'ден': 86400,
              'нед': 604800,
              'мес': 2592000,
              'г': 31536000, 'год': 31536000, 'лет': 31536000
            };

            const getUnitMatch = (str) => {
              let lower = str.toLowerCase();
              let longestMatch = null;
              for (let key in timeUnits) {
                if (lower.startsWith(key)) {
                  if (!longestMatch || key.length > longestMatch.length) {
                    longestMatch = key;
                  }
                }
              }
              return longestMatch ? timeUnits[longestMatch] : null;
            };

            let mult1 = getUnitMatch(u1);
            let mult2 = getUnitMatch(u2);

            if (mult1 !== null && mult2 !== null) {
              isCurrencyOut = u2;
              let res = (v * mult1 / mult2);
              return res.toFixed(4);
            }

            return m;
          });

          // X это сколько % от Y
          s = s.replace(/([\d\.,\s]+)\s+это\s+сколько\s+%\s+от\s+([\d\.,\s]+)/gi, (m, a, b) => {
            let va = parseFloat(cleanNumber(a));
            let vb = parseFloat(cleanNumber(b));
            isCurrencyOut = '%';
            return ((va / vb) * 100).toFixed(4);
          });

          // Percentage "от" (e.g. 35% от $550)
          s = s.replace(/([\d\.,\s]+)\s*%\s*(?:от|of)\s*([\$€£₽]?)\s*([\d\.,\s]+)/gi, (m, p, cur, val) => {
            if (cur) isCurrencyOut = cur;
            let pv = parseFloat(cleanNumber(p));
            let vv = parseFloat(cleanNumber(val));
            return ((pv / 100) * vv).toFixed(4);
          });

          // Discount (e.g. X - 15% скидка)
          s = s.replace(/([\d\.,\s]+)\s*(?:[\$€£₽a-zа-я]{0,3})?\s*([-+])\s*([\d\.,\s]+)\s*%\s*(?:скидка)?/gi, (m, a, sign, b) => {
            let av = parseFloat(cleanNumber(a));
            let bv = parseFloat(cleanNumber(b));
            let pct = (av * bv / 100);
            return sign === '-' ? (av - pct).toFixed(4) : (av + pct).toFixed(4);
          });

          // Time evaluation (e.g. 15:00 + 03:00, 12:00 - 5 часов)
          let timeMatch = s.match(/(?:^|\s)(\d{1,2}):(\d{2})\s*([-+])\s*(.+)/);
          if (timeMatch) {
            let baseH = parseInt(timeMatch[1], 10);
            let baseM = parseInt(timeMatch[2], 10);
            let sign = timeMatch[3];
            let rest = timeMatch[4].trim();

            let timeDir = sign === '+' ? 1 : -1;
            let addMins = 0;

            let rhsTimeMatch = rest.match(/^(\d{1,2}):(\d{2})$/);
            if (rhsTimeMatch) {
              addMins = parseInt(rhsTimeMatch[1], 10) * 60 + parseInt(rhsTimeMatch[2], 10);
            } else {
              let hmMatchH = rest.match(/([\d\.,]+)\s*(час[a-zа-яё]*)/);
              if (hmMatchH) addMins += parseFloat(cleanNumber(hmMatchH[1])) * 60;

              let hmMatchM = rest.match(/([\d\.,]+)\s*(мин[a-zа-яё]*)/);
              if (hmMatchM) addMins += parseFloat(cleanNumber(hmMatchM[1]));
            }

            if (rhsTimeMatch || rest.match(/(час|мин)/)) {
              let totalMins = baseH * 60 + baseM + timeDir * addMins;
              let days = 0;
              while (totalMins < 0) { totalMins += 24 * 60; days--; }
              while (totalMins >= 24 * 60) { totalMins -= 24 * 60; days++; }

              let outH = Math.floor(totalMins / 60);
              let outM = Math.round(totalMins % 60);
              let resTime = `${String(outH).padStart(2, '0')}:${String(outM).padStart(2, '0')}`;
              if (days !== 0) {
                resTime += ` (${days > 0 ? '+' : ''}${days} дн)`;
              }
              return resTime;
            }
          }

          // Cleanup currency symbols
          if (s.includes('$')) { isCurrencyOut = '$'; s = s.replace(/\$/g, ''); }
          if (s.includes('€')) { isCurrencyOut = '€'; s = s.replace(/€/g, ''); }

          // Pure math evaluation
          s = cleanNumber(s);
          let mathStr = s.replace(/[^\d\.\+\-\*\/\(\)]/g, '');

          if (!mathStr) return '';

          let res = eval(mathStr);
          if (isNaN(res) || !isFinite(res)) return '';

          let out = res;
          if (out % 1 !== 0) {
            out = out.toFixed(2).replace(/\.00$/, '');
            out = out.replace('.', ',');
          }

          if (isCurrencyOut) {
            if (isCurrencyOut === '$' || isCurrencyOut === 'USD') return '$' + out;
            if (isCurrencyOut === '€' || isCurrencyOut === 'EUR') return '€' + out;
            if (isCurrencyOut === 'RUB') return out + ' ₽';
            return out + ' ' + isCurrencyOut;
          }

          // Format number with spaces
          const parts = out.toString().split(',');
          parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
          return parts.join(',');
        } catch (e) {
          return '';
        }
      }

      function updateCalc(input) {
        const row = input.closest('.calc-row');
        const highlightDiv = row.querySelector('.editor-highlight');
        const resultSpan = row.querySelector('.calc-result');

        // Update highlight
        highlightDiv.innerHTML = applyHighlights(input.value);

        // Sync scroll
        highlightDiv.scrollLeft = input.scrollLeft;

        // Update result
        const result = evaluateLine(input.value);
        resultSpan.textContent = result || '-';
        resultSpan.title = result || ''; // Show tooltip if text is clipped
      }

      function updateAll() {
        document.querySelectorAll('.calc-input').forEach(input => updateCalc(input));
      }

      document.querySelectorAll('.calc-input').forEach(input => {
        input.addEventListener('input', () => updateCalc(input));
        input.addEventListener('scroll', () => {
          const highlightDiv = input.closest('.calc-row').querySelector('.editor-highlight');
          highlightDiv.scrollLeft = input.scrollLeft;
        });
        // Initial update
        updateCalc(input);
      });
    </script>
  </div>

  <link rel="stylesheet" href="footer.css">
  <div id="footer"></div>
  <script>
    fetch('footer.html')
      .then(r => r.text())
      .then(html => document.getElementById('footer').innerHTML = html);
  </script>

  <link rel="stylesheet" href="auth-widget.css">
  <script type="module" src="nav-widget.js"></script>
  <script type="module" src="auth-widget.js"></script>
  <script type="module" src="header.js"></script>
</body>
