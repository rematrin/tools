<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulver — Умный блокнот</title>

    <link rel="stylesheet" href="theme.css">

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            padding-top: 30px;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg, #f4f5f5);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text, #333);
        }

        .soulver-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 20px;
            box-sizing: border-box;
        }

        .soulver-window {
            width: 100%;
            max-width: 900px;
            height: 80vh;
            min-height: 500px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1), 0 5px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #dcdcdc;
            /* Support dark theme gracefully */
        }

        body.dark .soulver-window {
            background: #1e1e1e;
            border-color: #333;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }



        .toolbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 24px;
            font-size: 13px;
            color: #888;
            background: #fff;
        }

        body.dark .toolbar {
            background: #1e1e1e;
            color: #aaa;
        }

        .app-content {
            display: flex;
            flex: 1;
            position: relative;
            background: #fff;
            border-top: 1px solid #e5e5e5;
            min-height: 0;
            /* Prevents flex children from stretching container */
        }

        body.dark .app-content {
            background: #1e1e1e;
            border-top-color: #333;
        }

        .clear-btn {
            background: #f0f0f0;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            color: #666;
            cursor: pointer;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        body.dark .clear-btn {
            background: #333;
            color: #aaa;
        }

        body.dark .clear-btn:hover {
            background: #444;
        }

        .editor-container {
            flex: 1;
            position: relative;
            background: transparent;
            overflow-y: auto;
            padding: 24px;
            /* Скрываем скроллбар */
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .editor-container::-webkit-scrollbar {
            display: none;
        }

        .editor-wrapper {
            position: relative;
            width: 100%;
        }

        .editor-textarea,
        .editor-highlight {
            margin: 0;
            padding: 0;
            font-size: 20px;
            line-height: 2;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            border: none;
            outline: none;
            box-sizing: border-box;
            white-space: pre;
            letter-spacing: 0.3px;
        }

        .editor-textarea {
            display: block;
            width: 100%;
            position: relative;
            color: transparent;
            background: transparent;
            caret-color: #000;
            resize: none;
            z-index: 2;
            overflow: hidden;
        }

        body.dark .editor-textarea {
            caret-color: #fff;
        }

        .editor-highlight {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            z-index: 1;
            color: #333;
            pointer-events: none;
            overflow: visible;
        }

        body.dark .editor-highlight {
            color: #e0e0e0;
        }

        /* Highlight Colors */
        .hl-num {
            color: #2A64F6;
            font-weight: 400;
        }

        .hl-kwd {
            color: #C24BB8;
            font-weight: 400;
        }

        body.dark .hl-num {
            color: #5B89FF;
        }

        body.dark .hl-kwd {
            color: #E071D7;
        }

        .results-container {
            width: 260px;
            background: #f7f7f7;
            border-left: 1px solid #e5e5e5;
            padding: 24px;
            overflow-y: auto;
            position: relative;
        }

        body.dark .results-container {
            background: #1a1a1a;
            border-left-color: #333;
        }

        .results {
            margin: 0;
            padding: 0;
            font-size: 20px;
            line-height: 2;
            color: #333;
            text-align: left;
            white-space: pre;
            letter-spacing: 0.3px;
        }

        body.dark .results {
            color: #e0e0e0;
        }

        .result-line {
            height: 40px;
            /* corresponds to font-size 20px, line-height 2 */
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .soulver-container {
                padding: 10px;
            }

            .toolbar {
                display: none;
                /* Hide toolbar to save space on mobile */
            }

            .editor-container {
                padding: 16px;
            }

            .editor-textarea,
            .editor-highlight {
                font-size: 16px;
            }

            .results-container {
                width: 120px;
                /* Make results panel smaller */
                padding: 16px 12px;
            }

            .results {
                font-size: 16px;
            }

            .result-line {
                height: 32px;
                /* corresponds to font-size 16px, line-height 2 */
            }
        }
    </style>
</head>

<body>
    <script src="theme-loader.js"></script>
    <div id="header-container"></div>

    <div class="soulver-container">
        <div class="soulver-window">


            <div class="toolbar">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="toolbar-hint">Запишите проблемы слева (попробуйте ниже)</span>
                    <button id="clearBtn" class="clear-btn">Очистить примеры</button>
                </div>
                <div class="toolbar-hint">Ответы отображаются справа</div>
            </div>

            <div class="app-content">
                <div class="editor-container" id="editorContainer">
                    <div class="editor-wrapper">
                        <div class="editor-highlight" aria-hidden="true" id="highlighter"></div>
                        <textarea class="editor-textarea" id="textarea" spellcheck="false" placeholder=""></textarea>
                    </div>
                </div>

                <div class="results-container" id="resultsContainer">
                    <div class="results" id="results"></div>
                </div>
            </div>
        </div>
    </div>

    <link rel="stylesheet" href="footer.css">
    <div id="footer"></div>
    <script>
        fetch('footer.html')
            .then(r => r.text())
            .then(html => document.getElementById('footer').innerHTML = html);
    </script>
    <link rel="stylesheet" href="auth-widget.css">
    <script type="module" src="nav-widget.js"></script>
    <script type="module" src="auth-widget.js"></script>
    <script type="module" src="header.js"></script>

    <script>
        const textarea = document.getElementById('textarea');
        const highlighter = document.getElementById('highlighter');
        const resultsDiv = document.getElementById('results');
        const resultsContainer = document.getElementById('resultsContainer');
        const editorContainer = document.getElementById('editorContainer');

        // Sync scroll
        editorContainer.addEventListener('scroll', () => {
            resultsContainer.scrollTop = editorContainer.scrollTop;
        });

        resultsContainer.addEventListener('scroll', () => {
            editorContainer.scrollTop = resultsContainer.scrollTop;
        });

        let exchangeRates = { USD: 1, EUR: 0.92, RUB: 90 };

        // Load real exchange rates
        fetch('https://open.er-api.com/v6/latest/USD')
            .then(res => res.json())
            .then(data => {
                if (data && data.rates) {
                    exchangeRates = data.rates;
                    update();
                }
            })
            .catch(err => console.error("Could not fetch rates:", err));

        const defaultText = `350 + 490

35% от $550

220 EUR в USD - 15% скидка

15 это сколько % от 200

5 часов в минутах

3 недели после завтра

через 2 недели

01.11.2025 + 2 месяца

1 ноября + 2 месяца

15:00 + 03:00

12:00 - 5 часов`;
        textarea.value = defaultText;

        const clearBtn = document.getElementById('clearBtn');
        if (clearBtn) {
            clearBtn.addEventListener('click', () => {
                textarea.value = '';
                adjustHeight();
                update();
                clearBtn.remove();
            });
        }

        textarea.addEventListener('input', () => {
            if (textarea.value.trim() !== defaultText.trim() && clearBtn && clearBtn.parentNode) {
                clearBtn.remove();
            }
            adjustHeight();
            update();
        });

        function adjustHeight() {
            textarea.style.height = 'auto';
            highlighter.style.height = 'auto';
            const scrollH = textarea.scrollHeight;
            textarea.style.height = scrollH + 'px';
            highlighter.style.height = scrollH + 'px';
        }

        function update() {
            const text = textarea.value;
            highlighter.innerHTML = applyHighlights(text);
            const lines = text.split('\n');

            resultsDiv.innerHTML = lines.map(line => {
                let res = evaluateLine(line);
                return `<div class="result-line">${res || ''}</div>`;
            }).join('');
        }

        function applyHighlights(text) {
            let s = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Highlight numbers and time (e.g. 15:00)
            s = s.replace(/(\b\d+(?:[\.,:]\d+)?\b)/g, '<span class="hl-num">$1</span>');

            // Highlight keywords and dynamically loaded currencies
            let curs = Object.keys(exchangeRates).join('|');
            let kwdRegex = new RegExp(`([%€\\$£₽]|\\b(?:${curs})\\b|милисек[ундах]*|миллисек[ундах]*|мсек|сек[ундах]*|недел[июьея]*|мес[яцв]*|год[а]*|лет|дн[ейя]*|день|час[ова]*|мин[утыа]*|это|сколько|от)`, 'gi');
            s = s.replace(kwdRegex, '<span class="hl-kwd">$1</span>');

            s = s.replace(/\n/g, '<br>');
            if (text.endsWith('\n')) {
                s += '<br>';
            }
            return s;
        }

        function cleanNumber(str) {
            return str.replace(/ /g, '').replace(',', '.');
        }

        function evaluateLine(line) {
            try {
                let s = line.toLowerCase().trim();
                let isCurrencyOut = null;
                if (!s) return '';

                // Date evaluation
                let dateMatch1 = s.match(/(\d+(?:\.\d+)?)\s+(дн[a-zа-яё]*|ден[a-zа-яё]*|нед[a-zа-яё]*|мес[a-zа-яё]*|год[a-zа-яё]*|лет)\s+(после|до)\s+(завтра|вчера|сегодня)/);
                let dateMatch2 = s.match(/(?:через|спустя)\s+(\d+(?:\.\d+)?)\s+(дн[a-zа-яё]*|ден[a-zа-яё]*|нед[a-zа-яё]*|мес[a-zа-яё]*|год[a-zа-яё]*|лет)/);
                let dateMatch3 = s.match(/(\d{1,2}(?:\.\d{1,2}\.\d{4}|\s*[a-zа-яё]+(?:\s*\d{4})?))\s*([-+])\s*(\d+(?:\.\d+)?)\s+(дн[a-zа-яё]*|ден[a-zа-яё]*|нед[a-zа-яё]*|мес[a-zа-яё]*|год[a-zа-яё]*|лет)/);

                let dateMatch = dateMatch1 || dateMatch2 || dateMatch3;
                if (dateMatch) {
                    let num, unitStr, dir = 1, baseOffset = 0, baseDate = new Date();
                    baseDate.setHours(0, 0, 0, 0);

                    if (dateMatch3) {
                        let dateStr = dateMatch3[1].trim();
                        dir = (dateMatch3[2] === '+') ? 1 : -1;
                        num = parseFloat(cleanNumber(dateMatch3[3]));
                        unitStr = dateMatch3[4];

                        if (/\d{1,2}\.\d{1,2}\.\d{4}/.test(dateStr)) {
                            let parts = dateStr.split('.');
                            baseDate = new Date(parts[2], parseInt(parts[1], 10) - 1, parts[0]);
                        } else {
                            let strParts = dateStr.split(/\s+/);
                            let day = parseInt(strParts[0], 10);
                            let monthStr = strParts[1];
                            let year = strParts[2] ? parseInt(strParts[2], 10) : baseDate.getFullYear();

                            let monthsMap = {
                                'янв': 0, 'фев': 1, 'мар': 2, 'апр': 3, 'мая': 4, 'май': 4,
                                'июн': 5, 'июл': 6, 'авг': 7, 'сен': 8, 'окт': 9, 'ноя': 10, 'дек': 11
                            };

                            let monthIdx = 0;
                            for (let m in monthsMap) {
                                if (monthStr.startsWith(m)) { monthIdx = monthsMap[m]; break; }
                            }
                            baseDate = new Date(year, monthIdx, day);
                        }
                    } else {
                        num = parseFloat(cleanNumber(dateMatch[1]));
                        unitStr = dateMatch[2];

                        if (dateMatch1) {
                            let dirStr = dateMatch1[3];
                            let baseStr = dateMatch1[4];
                            dir = (dirStr === 'после') ? 1 : -1;
                            if (baseStr === 'завтра') baseOffset = 1;
                            if (baseStr === 'вчера') baseOffset = -1;
                        }
                    }

                    let d = new Date(baseDate.getTime());
                    d.setDate(d.getDate() + baseOffset);

                    if (unitStr.startsWith('мес')) {
                        d.setMonth(d.getMonth() + dir * num);
                    } else if (unitStr.startsWith('год') || unitStr.startsWith('лет')) {
                        d.setFullYear(d.getFullYear() + dir * num);
                    } else {
                        let days = 0;
                        if (unitStr.startsWith('дн') || unitStr.startsWith('ден')) days = num;
                        else if (unitStr.startsWith('нед')) days = num * 7;
                        d.setDate(d.getDate() + dir * days);
                    }

                    let dispMonths = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
                    let resYear = d.getFullYear() !== new Date().getFullYear() ? ` ${d.getFullYear()}` : '';
                    return `${d.getDate()} ${dispMonths[d.getMonth()]}${resYear}`;
                }

                // Currency exchange (e.g. 220 EUR в USD)
                s = s.replace(/([\d\.,\s]+)\s*([a-zа-я]{3})\s+в\s+([a-zа-я]{3})/gi, (m, val, c1, c2) => {
                    let v = parseFloat(cleanNumber(val));
                    let map = { 'eur': 'EUR', 'евр': 'EUR', 'usd': 'USD', 'дол': 'USD', 'rub': 'RUB', 'руб': 'RUB' };
                    let from = map[c1.toLowerCase()] || c1.toUpperCase();
                    let to = map[c2.toLowerCase()] || c2.toUpperCase();

                    if (exchangeRates && exchangeRates[from] && exchangeRates[to]) {
                        isCurrencyOut = to;
                        return (v / exchangeRates[from] * exchangeRates[to]).toFixed(4);
                    }
                    return val; // fallback
                });

                // Unit Conversion (e.g. 5 часов в минутах)
                s = s.replace(/([\d\.,\s]+)\s+([a-zа-яё]+)\s+в\s+([a-zа-яё]+)/gi, (m, val, u1, u2) => {
                    let v = parseFloat(cleanNumber(val));

                    let timeUnits = {
                        'мс': 0.001, 'мсек': 0.001, 'милисек': 0.001, 'миллисек': 0.001,
                        'с': 1, 'сек': 1, 'секунд': 1,
                        'м': 60, 'мин': 60, 'минут': 60,
                        'ч': 3600, 'час': 3600,
                        'д': 86400, 'дн': 86400, 'ден': 86400,
                        'нед': 604800,
                        'мес': 2592000,
                        'г': 31536000, 'год': 31536000, 'лет': 31536000
                    };

                    const getUnitMatch = (str) => {
                        let lower = str.toLowerCase();
                        let longestMatch = null;
                        for (let key in timeUnits) {
                            if (lower.startsWith(key)) {
                                if (!longestMatch || key.length > longestMatch.length) {
                                    longestMatch = key;
                                }
                            }
                        }
                        return longestMatch ? timeUnits[longestMatch] : null;
                    };

                    let mult1 = getUnitMatch(u1);
                    let mult2 = getUnitMatch(u2);

                    if (mult1 !== null && mult2 !== null) {
                        isCurrencyOut = u2;
                        let res = (v * mult1 / mult2);
                        return res.toFixed(4);
                    }

                    return m;
                });

                // X это сколько % от Y
                s = s.replace(/([\d\.,\s]+)\s+это\s+сколько\s+%\s+от\s+([\d\.,\s]+)/gi, (m, a, b) => {
                    let va = parseFloat(cleanNumber(a));
                    let vb = parseFloat(cleanNumber(b));
                    isCurrencyOut = '%';
                    return ((va / vb) * 100).toFixed(4);
                });

                // Percentage "от" (e.g. 35% от $550)
                s = s.replace(/([\d\.,\s]+)\s*%\s*(?:от|of)\s*([\$€£₽]?)\s*([\d\.,\s]+)/gi, (m, p, cur, val) => {
                    if (cur) isCurrencyOut = cur;
                    let pv = parseFloat(cleanNumber(p));
                    let vv = parseFloat(cleanNumber(val));
                    return ((pv / 100) * vv).toFixed(4);
                });

                // Discount (e.g. X - 15% скидка)
                s = s.replace(/([\d\.,\s]+)\s*(?:[\$€£₽a-zа-я]{0,3})?\s*([-+])\s*([\d\.,\s]+)\s*%\s*(?:скидка)?/gi, (m, a, sign, b) => {
                    let av = parseFloat(cleanNumber(a));
                    let bv = parseFloat(cleanNumber(b));
                    let pct = (av * bv / 100);
                    return sign === '-' ? (av - pct).toFixed(4) : (av + pct).toFixed(4);
                });

                // Time evaluation (e.g. 15:00 + 03:00, 12:00 - 5 часов)
                let timeMatch = s.match(/(?:^|\s)(\d{1,2}):(\d{2})\s*([-+])\s*(.+)/);
                if (timeMatch) {
                    let baseH = parseInt(timeMatch[1], 10);
                    let baseM = parseInt(timeMatch[2], 10);
                    let sign = timeMatch[3];
                    let rest = timeMatch[4].trim();

                    let timeDir = sign === '+' ? 1 : -1;
                    let addMins = 0;

                    let rhsTimeMatch = rest.match(/^(\d{1,2}):(\d{2})$/);
                    if (rhsTimeMatch) {
                        addMins = parseInt(rhsTimeMatch[1], 10) * 60 + parseInt(rhsTimeMatch[2], 10);
                    } else {
                        let hmMatchH = rest.match(/([\d\.,]+)\s*(час[a-zа-яё]*)/);
                        if (hmMatchH) addMins += parseFloat(cleanNumber(hmMatchH[1])) * 60;

                        let hmMatchM = rest.match(/([\d\.,]+)\s*(мин[a-zа-яё]*)/);
                        if (hmMatchM) addMins += parseFloat(cleanNumber(hmMatchM[1]));
                    }

                    if (rhsTimeMatch || rest.match(/(час|мин)/)) {
                        let totalMins = baseH * 60 + baseM + timeDir * addMins;
                        let days = 0;
                        while (totalMins < 0) { totalMins += 24 * 60; days--; }
                        while (totalMins >= 24 * 60) { totalMins -= 24 * 60; days++; }

                        let outH = Math.floor(totalMins / 60);
                        let outM = Math.round(totalMins % 60);
                        let resTime = `${String(outH).padStart(2, '0')}:${String(outM).padStart(2, '0')}`;
                        if (days !== 0) {
                            resTime += ` (${days > 0 ? '+' : ''}${days} дн)`;
                        }
                        return resTime;
                    }
                }

                // Cleanup currency symbols
                if (s.includes('$')) { isCurrencyOut = '$'; s = s.replace(/\$/g, ''); }
                if (s.includes('€')) { isCurrencyOut = '€'; s = s.replace(/€/g, ''); }

                // Pure math evaluation
                s = cleanNumber(s);
                let mathStr = s.replace(/[^\d\.\+\-\*\/\(\)]/g, '');

                if (!mathStr) return '';

                let res = eval(mathStr);
                if (isNaN(res) || !isFinite(res)) return '';

                let out = res;
                if (out % 1 !== 0) {
                    out = out.toFixed(2).replace(/\.00$/, '');
                    out = out.replace('.', ',');
                }

                if (isCurrencyOut) {
                    if (isCurrencyOut === '$' || isCurrencyOut === 'USD') return '$' + out;
                    if (isCurrencyOut === '€' || isCurrencyOut === 'EUR') return '€' + out;
                    if (isCurrencyOut === 'RUB') return out + ' ₽';
                    return out + ' ' + isCurrencyOut;
                }

                return out;
            } catch (e) {
                return '';
            }
        }

        // Init
        adjustHeight();
        update();

        // Responsive text selection
        new ResizeObserver(() => {
            adjustHeight();
        }).observe(editorContainer);

    </script>
</body>

</html>
